[pytest]
# 冒烟：pytest -m smoke
# 并行：pytest -n auto --dist=loadfile（每个文件独立 worker，module fixture 兼容）
# Allure 报告：按模块输出到 allure-results/{module}/json/
addopts = -v -s --tb=short --reruns 2 --reruns-delay 1
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = script
markers =
    smoke: 冒烟套件（PR/快速验证，建议 <15min）
    regression: 全量回归
    login: 登录流程专用（需独立浏览器，勿与其它 UI 用例并行）
    destructive: 增删改类用例，可能产生/清理测试数据
    slow: 单用例预计超过 60 秒
    flaky: 已知不稳定用例（rerun 次数独立于全局配置）
    validation: 表单校验类用例
    normal_flow: 正常业务流程
    exception_flow: 异常流程测试
    boundary: 边界场景测试
    permission: 权限相关测试
    duplicate_submit: 重复提交测试
    api_exception: API 异常处理测试
filterwarnings =
    ignore::DeprecationWarning
