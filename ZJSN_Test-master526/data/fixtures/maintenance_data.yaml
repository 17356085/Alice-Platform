# 设备维保模块测试数据
#
# 基于实际页面结构（维保计划管理，非维保记录管理）

# ============================================================
# 搜索场景
# ============================================================
search:
  maintenance_type: "日检"              # 维保类型筛选
  status_pending: "待执行"               # 状态筛选
  non_existent_type: "大修_ZZZ_NOT_EXIST" # 不存在的维保类型

# ============================================================
# 新增维保计划
# ============================================================
add_plan:
  planName: "AUTO_TEST_自动化测试计划"
  deviceName: "Test"                     # 从下拉列表中选择
  maintenanceType: "日检"
  cycle: 7
  remark: "AUTO_TEST_自动化测试创建"

# ============================================================
# 编辑维保计划
# ============================================================
edit_plan:
  planName: "AUTO_TEST_编辑后的测试计划"

# ============================================================
# 边界值
# ============================================================
boundary:
  cycle_zero: 0                          # 周期为0
  cycle_large: 99999                     # 大周期
  invalid_page: 0                        # 无效页码
  overshoot_page: 999                     # 超限页码
