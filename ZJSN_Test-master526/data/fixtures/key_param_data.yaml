# 关键参数监控模块测试数据
# ⚠️ 标注 [推断] 的字段需根据实际系统数据修正
# ⚠️ 本页面为只读监控页，测试数据用于搜索/筛选/验证，不产生测试数据

# ===================================================================
# 搜索关键词（需确保系统内有对应数据，执行时动态调整）
# ===================================================================
search_keywords:
  # 以下关键词从实际数据中选择，自动化执行时优先尝试
  keyword_temp: "温度"          # 按监测参数搜索
  keyword_pressure: "压力"      # 按监测参数搜索
  keyword_sensor: "传感器"      # 按传感器名称搜索
  keyword_no_result: "zzzz_nonexistent_sensor_99999"  # 搜索无结果

# ===================================================================
# 筛选条件
# ===================================================================
filters:
  # 参数状态选项 [推断]
  param_status:
    normal: "正常"
    warning: "预警"
    alarm: "报警"
  # 所属设备：从设备台账中选一个有绑定传感器的设备（执行时动态选取）
  # 执行策略：选择下拉中的第一个选项

# ===================================================================
# 统计卡片预期标签 [推断]
# ===================================================================
stat_cards:
  # 实际标签以页面为准，以下为推断值
  expected_labels:
    - "监控参数总数"   # 或 "传感器总数"
    - "正常"
    - "预警"
    - "报警"

# ===================================================================
# 表格预期列标题 [推断]
# ===================================================================
table_headers:
  expected_columns:
    - "传感器名称"
    - "传感器编号"
    - "所属装置"       # [推断] 可选列
    - "绑定设备"        # [推断] 或 "所属设备"
    - "监测参数"
    - "当前值"
    - "计量单位"        # [推断] 或 "单位"
    - "量程下限"        # [推断]
    - "量程上限"        # [推断]
    - "参数状态"
    - "最近上传时间"
    - "在线状态"        # [推断]
    - "操作"

# ===================================================================
# el-tag 状态样式预期
# ===================================================================
tag_styles:
  normal_status:    "success"   # 正常状态应使用 success 类型（绿色）
  warning_status:   "warning"   # 预警状态应使用 warning 类型（橙色） [推断]
  alarm_status:     "danger"    # 报警状态应使用 danger 类型（红色）
  online_status:    "success"   # 在线状态应使用 success 类型（绿色） [推断]
  offline_status:   "info"      # 离线状态应使用 info 类型（灰色） [推断]

# ===================================================================
# 分页配置
# ===================================================================
pagination:
  page_sizes: [10, 20, 50, 100]
  default_page_size: 10
  # 测试使用的页码
  jump_page: 3        # 跳转目标页（需有 ≥3 页数据）
  invalid_page: 999   # 越界页码（边界测试）
  invalid_page_zero: 0    # 非法页码-0
  invalid_page_neg: -1    # 非法页码-负数

# ===================================================================
# 趋势弹窗 [推断]
# ===================================================================
trend:
  time_ranges:
    - "1小时"
    - "6小时"
    - "24小时"
    - "7天"
  tab_chart: "曲线图"
  tab_table: "数据列表"
  # 统计摘要的字段标签 [推断]
  stat_labels:
    current: "当前值"
    average: "平均值"
    min: "最小值"
    max: "最大值"

# ===================================================================
# 详情弹窗字段标签 [推断]
# ===================================================================
detail_labels:
  sensor_name:    "传感器名称"
  sensor_code:    "传感器编号"
  unit:           "所属装置"
  device:         "绑定设备"
  param:          "监测参数"
  current_value:  "当前值"
  unit_label:     "计量单位"
  range:          "量程范围"
  param_status:   "参数状态"
  online_status:  "在线状态"
  location:       "安装位置"
  last_upload:    "最近上传时间"

# ===================================================================
# 数据校验：状态逻辑验证
# ===================================================================
status_logic:
  # 验证规则：当前值 ∈ [量程下限, 量程上限] → "正常"；否则 → "报警"
  verify_row_count: 5       # 随机验证行数
  verify_normal_rows: 5     # 验证正常状态的传感器数
  verify_alarm_rows: 3      # 验证报警状态的传感器数 [推断]

# ===================================================================
# 传感器管理联动测试 [推断]
# ===================================================================
cross_page:
  linked_sensor_name: "autotest_kp_link_001"   # 用于跨页联动测试的传感器名
  linked_sensor_type: "温度传感器"
  linked_device: ""          # 执行时动态选择
