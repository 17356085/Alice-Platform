# 合同管理模块测试数据
# 所有业务数据在此集中维护，测试代码通过 contract_test_data fixture 注入

# ── 存在于系统中的合同数据 ────────────────────────────────────────────
existing:
  # 精确搜索用合同编号
  contract_no: "HT20260527"
  contract_no_2: "HT202605280001"

  # 模糊搜索用客户名称
  customer_name: "贵州能源集团有限公司"
  customer_keyword: "贵州"           # 模糊匹配前缀

  # 下拉筛选用枚举值
  product_type: "LNG"
  status_completed: "已完成"
  status_terminated: "已终止"

  # 特定状态合同（用于展示测试）
  contract_completed: "HT202605280001"    # 进度100%，状态已完成
  contract_terminated: "HT202606030001"   # 进度0%，状态已终止
  contract_terminated_2: "HT202605270001" # 进度0%，状态已终止
  contract_completed_2: "HT20260527"      # 进度100%，状态已完成（焦油）

# ── 不存在于系统中的数据（用于空结果/边界测试）────────────────────────
nonexistent:
  contract_no: "HT999999999999"
  customer_name: "不存在的客户名称XYZ123"

# ── 日期范围测试数据 ────────────────────────────────────────────────
date_ranges:
  full_year:
    start: "2026-01-01"
    end: "2026-12-31"
  half_year:
    start: "2026-01-01"
    end: "2026-06-30"

# ── 销售订单测试数据 ────────────────────────────────────────────────
sales_order:
  delivery_date: "2026-06-15 10:00:00"
  product_type: "LNG"

# ── 表头完整性校验 ──────────────────────────────────────────────────
expected_headers:
  - "合同编号"
  - "客户名称"
  - "产品"
  - "合同总量(吨)"
  - "已执行量"
  - "有效期至"
  - "状态"
  - "操作"
