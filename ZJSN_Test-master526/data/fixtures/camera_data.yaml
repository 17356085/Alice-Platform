# 摄像头管理模块测试数据
# ⚠️ 标注 [推断] 的字段需根据实际系统字段修正

# ===================================================================
# 新增摄像头 — 必填字段
# ===================================================================
camera_add_required:
  name: "autotest_camera_001"         # 摄像头名称
  code: "CAM-AUTO-001"                # 摄像头编号（系统内唯一）
  stream_url: "rtsp://192.168.1.100:554/stream1"  # 推流地址 [推断]

# ===================================================================
# 新增摄像头 — 全部字段 [推断]
# ===================================================================
camera_add_all:
  name: "autotest_camera_full_001"        # 摄像头名称
  code: "CAM-AUTO-FULL-001"              # 摄像头编号
  stream_url: "rtsp://192.168.1.100:554/stream2"  # 推流地址
  type: "固定枪机"                          # 摄像头类型 [推断]
  location: "LNG储罐区东南角"               # 安装位置
  install_date: "2026-06-05"              # 安装日期
  remark: "自动化测试-全部字段"              # 备注

# ===================================================================
# 编辑摄像头 — 部分更新字段
# ===================================================================
camera_edit:
  name: "autotest_camera_edited"     # 修改后名称
  location: "更新后的测试位置"         # 修改后安装位置

# ===================================================================
# 新增取消 — 不保存的测试数据
# ===================================================================
camera_add_cancel:
  name: "autotest_camera_cancel"

# ===================================================================
# 异常测试数据
# ===================================================================
camera_exception:
  # 搜索无结果的关键词
  keyword_no_result: "zzzz_nonexistent_camera_99999"

  # 必填为空验证
  empty_name:
    code: "CAM-EXCP-001"
    stream_url: "rtsp://192.168.1.100:554/test"

  # 已存在的编号（需先通过 add_required 创建）
  duplicate_code:
    name: "重复编号测试"
    code: "CAM-AUTO-001"  # 与 camera_add_required.code 重复
    stream_url: "rtsp://192.168.1.100:554/test"

  # 格式错误的推流地址 [推断]
  invalid_stream_url:
    name: "推流格式测试"
    code: "CAM-EXCP-004"
    stream_url: "not-a-valid-url-!!!"

# ===================================================================
# 重复提交测试数据
# ===================================================================
camera_duplicate_submit:
  name: "autotest_duplicate_submit"
  code: "CAM-DUP-002"
  stream_url: "rtsp://192.168.1.100:554/test"

# ===================================================================
# 搜索关键词（需确保系统内有对应数据）
# ===================================================================
search_keywords:
  # 以下关键词从实际数据中选择，自动化执行时动态调整
  keyword_online: "在线"  # [推断] 用于状态下拉

  # 统计卡片预期标签文本 [推断]
  stat_labels:
    - "摄像头总数"
    - "在线"
    - "离线"
    - "未配置"

# ===================================================================
# 导入导出测试
# ===================================================================
import_file: "camera_import_test.xlsx"  # 导入测试文件名 [推断]

# ===================================================================
# 分页配置
# ===================================================================
pagination:
  page_sizes: [10, 20, 50, 100]
  default_page_size: 10
