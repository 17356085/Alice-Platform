<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Replay — Agent Observatory</title>
<style>
  :root {
    --bg: #0d1117; --card-bg: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
    --success: #3fb950; --error: #f85149; --warn: #d2991d; --info: #8b949e;
    --critical: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.5em; margin-bottom: 8px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 0.9em; margin-bottom: 24px; }

  /* Run selector */
  .run-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .run-selector select { flex: 1; min-width: 300px; padding: 8px 12px;
    background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.9em; }
  .run-selector button { padding: 8px 20px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; cursor: pointer; font-size: 0.9em; font-weight: 600; }
  .run-selector button:hover { opacity: 0.85; }

  /* Summary */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 24px; }
  .summary-card { background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; text-align: center; }
  .summary-card .value { font-size: 1.5em; font-weight: 700; }
  .summary-card .label { font-size: 0.8em; color: var(--text-dim); margin-top: 4px; }
  .value.success { color: var(--success); }
  .value.error { color: var(--error); }
  .value.warn { color: var(--warn); }

  /* Timeline */
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: var(--border); }
  .step { position: relative; margin-bottom: 16px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .step::before { content: ''; position: absolute; left: -25px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border);
    background: var(--bg); }
  .step.success::before { border-color: var(--success); background: var(--success); }
  .step.error::before { border-color: var(--error); background: var(--error); }
  .step.partial::before { border-color: var(--warn); background: var(--warn); }

  .step-header { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .step-title { font-weight: 600; font-size: 0.95em; }
  .step-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
  .badge-success { background: rgba(63,185,80,0.15); color: var(--success); }
  .badge-error { background: rgba(248,81,73,0.15); color: var(--error); }
  .badge-warn { background: rgba(210,153,29,0.15); color: var(--warn); }
  .badge-info { background: rgba(139,148,158,0.15); color: var(--info); }
  .badge-critical { background: rgba(255,68,68,0.2); color: var(--critical); }

  .step-meta { display: flex; gap: 16px; color: var(--text-dim); font-size: 0.8em;
    margin-bottom: 6px; flex-wrap: wrap; }
  .step-meta span { white-space: nowrap; }
  .step-preview { background: var(--bg); border-radius: 4px; padding: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8em;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    color: var(--text-dim); }
  .step-error { color: var(--error); background: rgba(248,81,73,0.08);
    border-radius: 4px; padding: 8px; margin-top: 6px; font-size: 0.85em; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty h2 { font-size: 1.2em; margin-bottom: 8px; }

  /* Responsive */
  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .step-header { flex-direction: column; align-items: flex-start; }
    .timeline { padding-left: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 <span>Agent Trace</span> Replay</h1>
  <p class="subtitle">运行时观测面板 — 回放任意 Agent 执行的每一步输入/工具调用/返回结果/耗时</p>

  <div class="run-selector">
    <select id="runSelect">
      <option value="">— 选择运行 ID —</option>
    </select>
    <button onclick="loadTrace()">加载</button>
    <button onclick="loadRuns()" style="background: var(--border);">刷新列表</button>
  </div>

  <div id="summary" class="summary" style="display:none;"></div>
  <div id="timeline" class="timeline"></div>
  <div id="empty" class="empty">
    <h2>尚未选择运行</h2>
    <p>从上方下拉列表选择一次 Agent 运行，或手动输入 run ID 后点击"加载"</p>
  </div>
</div>

<script>
  const API = '/api/trace';

  async function loadRuns() {
    const sel = document.getElementById('runSelect');
    sel.innerHTML = '<option value="">加载中...</option>';
    try {
      const res = await fetch(API + '/runs?limit=30');
      const data = await res.json();
      const runs = data.runs || [];
      sel.innerHTML = '<option value="">— 选择运行 ID —</option>';
      runs.forEach(r => {
        const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('zh-CN') : '';
        const opt = document.createElement('option');
        opt.value = r.run_id;
        opt.textContent = `${r.run_id} | ${r.agent_name || '?'} | ${ts} | ${r.event_count} 步`;
        sel.appendChild(opt);
      });
    } catch (e) {
      sel.innerHTML = '<option value="">加载失败</option>';
    }
  }

  async function loadTrace() {
    const runId = document.getElementById('runSelect').value;
    if (!runId) return;

    document.getElementById('empty').style.display = 'none';
    const summaryDiv = document.getElementById('summary');
    const timelineDiv = document.getElementById('timeline');
    summaryDiv.style.display = 'none';
    timelineDiv.innerHTML = '<div class="empty"><p>加载中...</p></div>';

    try {
      const res = await fetch(API + '/' + encodeURIComponent(runId));
      const data = await res.json();
      render(data);
    } catch (e) {
      timelineDiv.innerHTML = `<div class="empty"><p>加载失败: ${e.message}</p></div>`;
    }
  }

  function render(data) {
    const summaryDiv = document.getElementById('summary');
    const timelineDiv = document.getElementById('timeline');

    if (!data.steps || data.steps.length === 0) {
      timelineDiv.innerHTML = '<div class="empty"><h2>无 trace 数据</h2><p>该运行可能未产生 trace 事件，或 run_id 不正确</p></div>';
      summaryDiv.style.display = 'none';
      return;
    }

    // Summary
    const s = data.summary || {};
    const errors = data.steps.filter(st => st.status === 'error').length;
    const success = data.steps.filter(st => st.status === 'success').length;
    summaryDiv.innerHTML = `
      <div class="summary-card"><div class="value">${data.steps.length}</div><div class="label">总步数</div></div>
      <div class="summary-card"><div class="value success">${success}</div><div class="label">成功</div></div>
      <div class="summary-card"><div class="value error">${errors}</div><div class="label">错误</div></div>
      <div class="summary-card"><div class="value">$${s.total_cost?.toFixed(4) || '0'}</div><div class="label">总成本</div></div>
      <div class="summary-card"><div class="value">${(s.total_latency_ms / 1000).toFixed(1)}s</div><div class="label">总耗时</div></div>
    `;
    summaryDiv.style.display = 'grid';

    // Timeline
    let html = '';
    data.steps.forEach((st, i) => {
      const statusClass = st.status === 'success' ? 'success' : st.status === 'error' ? 'error' : 'partial';
      const badgeClass = st.status === 'success' ? 'badge-success' : st.status === 'error' ? 'badge-error' : 'badge-warn';
      const cost = st.cost?.toFixed(4) || '0';
      const latency = st.latency_ms ? (st.latency_ms / 1000).toFixed(1) + 's' : '-';

      // Safety badge
      const safetyFlags = st.metadata?.safety_flags || [];
      const safetyBadge = safetyFlags.length > 0
        ? `<span class="badge badge-critical">⚠安全:${safetyFlags.length}</span>` : '';

      html += `
        <div class="step ${statusClass}">
          <div class="step-header">
            <span class="step-title">#${st.seq} ${st.skill_id || st.event_type}</span>
            <div class="step-badges">
              <span class="badge ${badgeClass}">${st.status}</span>
              ${safetyBadge}
              <span class="badge badge-info">${st.model || st.provider || '?'}</span>
            </div>
          </div>
          <div class="step-meta">
            <span>⏱ ${latency}</span>
            <span>📥 ${st.tokens_in || 0}</span>
            <span>📤 ${st.tokens_out || 0}</span>
            <span>💰 $${cost}</span>
            <span>🕐 ${st.timestamp ? new Date(st.timestamp).toLocaleTimeString('zh-CN') : ''}</span>
          </div>
          ${st.prompt_preview ? `<div class="step-preview"><strong>Prompt:</strong> ${escapeHtml(st.prompt_preview)}</div>` : ''}
          ${st.response_preview ? `<div class="step-preview"><strong>Response:</strong> ${escapeHtml(st.response_preview)}</div>` : ''}
          ${st.error ? `<div class="step-error">❌ ${escapeHtml(st.error)}</div>` : ''}
        </div>`;
    });
    timelineDiv.innerHTML = html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Init
  loadRuns();
</script>
</body>
</html>
