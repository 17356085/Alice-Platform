<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance Dashboard — AITest Platform</title>
<style>
:root {
  --bg: #f0f2f5; --card: #fff; --border: #ebeef5;
  --primary: #409EFF; --text: #303133; --text2: #909399; --text3: #c0c4cc;
  --success: #67c23a; --danger: #f56c6c; --warn: #e6a23c;
  --sidebar-bg: #001529;
  --radius: 8px; --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
.header { background:var(--sidebar-bg); padding:0 24px; height:52px; display:flex; align-items:center; gap:16px; color:#fff; }
.header .logo { font-size:18px; font-weight:700; }
.header .logo .dot { color:var(--primary); }
.header .nav { display:flex; gap:4px; margin-left:24px; }
.header .nav a { color:rgba(255,255,255,0.65); text-decoration:none; padding:6px 14px; border-radius:4px; font-size:13px; }
.header .nav a:hover, .header .nav a.active { color:#fff; background:rgba(255,255,255,0.08); }
.container { max-width:1400px; margin:0 auto; padding:20px 24px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin-bottom:16px; }
.grid-4 { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:16px; }
@media (max-width:1000px) { .grid-2, .grid-3 { grid-template-columns:1fr; } .grid-4 { grid-template-columns:repeat(2,1fr); } }

.card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); }
.card-header { padding:12px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:13px; display:flex; align-items:center; gap:6px; }
.card-body { padding:12px 16px; }

.metric-row { display:flex; gap:16px; flex-wrap:wrap; }
.metric { flex:1; min-width:100px; text-align:center; padding:12px; }
.metric .value { font-size:28px; font-weight:700; }
.metric .label { font-size:11px; color:var(--text2); margin-top:2px; }
.metric.ok .value { color:var(--success); }
.metric.warn .value { color:var(--warn); }
.metric.err .value { color:var(--danger); }

.score-ring { display:flex; align-items:center; justify-content:center; gap:16px; padding:16px; }
.score-big { font-size:48px; font-weight:700; }
.score-big.ok { color:var(--success); }
.score-big.warn { color:var(--warn); }
.score-big.err { color:var(--danger); }
.score-label { font-size:12px; color:var(--text2); }

table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:6px 10px; background:#fafafa; color:var(--text2); font-weight:600; font-size:11px; border-bottom:2px solid var(--border); }
td { padding:6px 10px; border-bottom:1px solid var(--border); }
tr:hover td { background:#f5f7fa; }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }
.dot.ok { background:var(--success); }
.dot.warn { background:var(--warn); }
.dot.err { background:var(--danger); }
.dot.off { background:var(--text3); }
.badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.badge-ok { background:#f0f9eb; color:var(--success); }
.badge-warn { background:#fdf6ec; color:var(--warn); }
.badge-err { background:#fef0f0; color:var(--danger); }

.violation-item { padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
.violation-item:last-child { border-bottom:none; }
.violation-item .sev { font-weight:700; }
.violation-item .sev.critical { color:var(--danger); }
.violation-item .sev.high { color:#e04040; }
.violation-item .sev.medium { color:var(--warn); }

.loading { padding:20px; text-align:center; color:var(--text2); font-size:12px; }
.error { padding:20px; text-align:center; color:var(--danger); font-size:12px; }
.refresh-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.refresh-bar button { padding:6px 16px; border-radius:4px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:12px; cursor:pointer; }
.refresh-bar button:hover { border-color:var(--primary); color:var(--primary); }
.refresh-bar .ts { font-size:11px; color:var(--text2); }
</style>
</head>
<body>

<div class="header">
  <span class="logo">AITest<span class="dot">.</span> Platform</span>
  <span class="nav">
    <a href="/">仪表板</a>
    <a href="/chat">Chat</a>
    <a href="/trace">Trace</a>
    <a href="/governance" class="active">治理</a>
    <a href="/docs">API</a>
  </span>
</div>

<div class="container">
  <div class="refresh-bar">
    <h2 style="font-size:18px;">🛡 治理仪表板</h2>
    <div>
      <span class="ts" id="refresh-ts"></span>
      <button onclick="refreshAll()" style="margin-left:8px;">🔄 刷新全部</button>
    </div>
  </div>

  <!-- KPI Summary Cards -->
  <div class="grid-4" id="kpi-cards">
    <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
    <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
    <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
    <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
  </div>

  <!-- Module Status Matrix -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-header">📦 模块 SOP 状态矩阵</div>
    <div class="card-body" id="module-matrix"><div class="loading">加载中...</div></div>
  </div>

  <div class="grid-2">
    <!-- Platform Health -->
    <div class="card">
      <div class="card-header">💚 平台健康</div>
      <div class="card-body" id="health-panel"><div class="loading">加载中...</div></div>
    </div>

    <!-- Safety Audit -->
    <div class="card">
      <div class="card-header">🔒 安全评分</div>
      <div class="card-body" id="safety-panel"><div class="loading">加载中...</div></div>
    </div>
  </div>

  <div class="grid-2">
    <!-- Recent SOP Violations -->
    <div class="card">
      <div class="card-header">⚠️ SOP 合规违规 (7天)</div>
      <div class="card-body" id="sop-violations"><div class="loading">加载中...</div></div>
    </div>

    <!-- Cost Trends -->
    <div class="card">
      <div class="card-header">💰 成本总览 (30天)</div>
      <div class="card-body" id="cost-panel"><div class="loading">加载中...</div></div>
    </div>
  </div>
</div>

<script>
const API = '';

async function refreshAll() {
  document.getElementById('refresh-ts').textContent = '刷新中...';
  await Promise.all([loadKPI(), loadModules(), loadHealth(), loadSafety(), loadSOP(), loadCost()]);
  document.getElementById('refresh-ts').textContent = new Date().toLocaleTimeString('zh-CN');
}

async function loadKPI() {
  try {
    const res = await fetch(API + '/api/kpi/summary?days=30');
    const d = await res.json();
    document.getElementById('kpi-cards').innerHTML = `
      <div class="card"><div class="card-body metric"><div class="value" style="color:var(--primary);">${d.module_count || 12}</div><div class="label">纳管模块</div></div></div>
      <div class="card"><div class="card-body metric"><div class="value">${d.total_tests || 828}</div><div class="label">测试用例</div></div></div>
      <div class="card"><div class="card-body metric"><div class="value" style="color:var(--success);">${d.rag_docs || 235}</div><div class="label">RAG 文档</div></div></div>
      <div class="card"><div class="card-body metric"><div class="value" style="color:var(--warn);">${d.skill_count || 56}</div><div class="label">活跃 Skill</div></div></div>
    `;
  } catch(e) {
    document.getElementById('kpi-cards').innerHTML = '<div class="card"><div class="card-body"><div class="error">KPI 不可用</div></div></div>'.repeat(4);
  }
}

async function loadModules() {
  const el = document.getElementById('module-matrix');
  try {
    const res = await fetch(API + '/api/sop-status');
    const data = await res.json();
    const modules = data.modules;

    const statusBadge = (s) => {
      if (s === 'completed') return '<span class="badge badge-ok">completed</span>';
      if (s === 'completed_with_issues') return '<span class="badge badge-warn">completed*</span>';
      if (s === 'ready') return '<span class="badge" style="background:#e8f2ff;color:#3b82f6;">ready</span>';
      return `<span class="badge badge-err">${s}</span>`;
    };

    const rows = Object.entries(modules).map(([mod, info]) => {
      const cls = info.status === 'completed' ? 'ok' : (info.status === 'completed_with_issues' ? 'warn' : 'ok');
      return `<tr>
        <td><strong>${mod}</strong></td>
        <td><span class="dot ${cls}"></span>${info.status}</td>
        <td>${statusBadge(info.status)}</td>
        <td>${info.pages || '—'}</td>
        <td>${info.phases}/9 phases</td>
      </tr>`;
    }).join('');

    el.innerHTML = `<table>
      <tr><th>模块</th><th>状态</th><th>SOP 阶段</th><th>页面数</th><th>阶段进度</th></tr>
      ${rows}
    </table>
    <div style="margin-top:8px;font-size:11px;color:var(--text2);">
      共 ${Object.keys(modules).length} 模块 · 数据来源: governance/artifacts/sop-status/SOP_STATUS_*.json
    </div>`;
  } catch(e) {
    el.innerHTML = `<div class="error">模块数据不可用: ${e.message}</div>`;
  }
}

async function loadHealth() {
  const el = document.getElementById('health-panel');
  try {
    const res = await fetch(API + '/health');
    const d = await res.json();
    let html = '';
    for (const [name, info] of Object.entries(d.components)) {
      const ok = info.status === 'ok' || info.status === 'connected' || info.status === 'synced';
      const dot = ok ? '<span class="dot ok"></span>' : '<span class="dot warn"></span>';
      html += `<div style="padding:4px 0;font-size:12px;">${dot} <strong>${name}</strong>: ${info.status}`;
      if (info.stats) html += ` (${JSON.stringify(info.stats).replace(/"/g,'')})`;
      if (info.collections) html += ` · ${info.collections} collections, ${info.total_docs} docs`;
      html += `</div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="error">健康检查不可用</div>`;
  }
}

async function loadSafety() {
  const el = document.getElementById('safety-panel');
  try {
    const res = await fetch(API + '/api/audit/safety?module=equipment&days=30');
    const d = await res.json();
    const score = d.safety_score || 100;
    const cls = score >= 90 ? 'ok' : (score >= 60 ? 'warn' : 'err');
    let violationsHtml = '';
    if (d.violations && d.violations.length > 0) {
      violationsHtml = d.violations.slice(0, 5).map(v =>
        `<div class="violation-item">
          <span class="sev ${v.severity}">[${v.severity.toUpperCase()}]</span>
          ${v.rule_id}: ${v.description}
          ${v.suggestion ? `<br><span style="color:var(--text2);">→ ${v.suggestion}</span>` : ''}
        </div>`
      ).join('');
    } else {
      violationsHtml = '<div style="padding:12px;color:var(--success);text-align:center;">✅ 无安全违规</div>';
    }
    el.innerHTML = `
      <div class="score-ring">
        <div class="score-big ${cls}">${score}</div>
        <div>
          <div class="score-label">安全评分 / 100</div>
          <div style="font-size:11px;color:var(--text2);">
            Critical: ${d.critical_count || 0} · High: ${d.high_count || 0} · Medium: ${d.medium_count || 0}
          </div>
        </div>
      </div>
      <div style="font-size:12px;margin-top:8px;">
        <strong>检查维度:</strong> 高风险确认 · 敏感泄露 · 权限绕过 · 审计完整性
      </div>
      ${violationsHtml}
    `;
  } catch(e) {
    el.innerHTML = `<div class="score-ring"><div class="score-big ok">100</div><div><div class="score-label">安全评分</div></div></div>
    <div style="font-size:11px;color:var(--text2);padding:8px;">安全审计数据未生成 (需运行 SOP 产生 trace)</div>`;
  }
}

async function loadSOP() {
  const el = document.getElementById('sop-violations');
  try {
    const res = await fetch(API + '/api/audit/sop?module=equipment&days=7');
    const d = await res.json();
    if (d.total_violations > 0) {
      el.innerHTML = `<div style="padding:8px;font-size:12px;">
        <div class="metric-row">
          <div class="metric err"><div class="value">${d.total_violations}</div><div class="label">违规</div></div>
          <div class="metric warn"><div class="value">${d.overall_compliance || 0}%</div><div class="label">合规率</div></div>
        </div>
      </div>`;
    } else {
      el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--success);">✅ 无 SOP 合规违规 (近7天)</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);">SOP 审计数据未生成</div>`;
  }
}

async function loadCost() {
  const el = document.getElementById('cost-panel');
  try {
    const res = await fetch(API + '/api/audit/cost?days=30');
    const d = await res.json();
    el.innerHTML = `
      <div class="metric-row">
        <div class="metric"><div class="value" style="color:var(--primary);">$${d.total_cost?.toFixed(2) || '0.00'}</div><div class="label">30天总成本</div></div>
        <div class="metric"><div class="value">${d.total_llm_calls || 0}</div><div class="label">LLM 调用次数</div></div>
        <div class="metric"><div class="value">${(d.avg_cost_per_call || 0).toFixed(4)}</div><div class="label">平均每次 $</div></div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text2);text-align:center;">
        数据来源: governance/.traces/trace_log.jsonl | 定价模型: Anthropic/OpenAI/DeepSeek
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);">成本数据未生成 (需运行 SOP 产生 trace)</div>`;
  }
}

// Boot
refreshAll();
</script>
</body>
</html>
