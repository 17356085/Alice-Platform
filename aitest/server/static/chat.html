<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AITest 工作台</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Color system — aligned with 鞍集管理系统 (Element Plus + Pure Admin)
   Primary: #409EFF | Sidebar: #001529 | Content: #f0f2f5
   Text: #303133 / #909399 | Success: #67c23a | Danger: #f56c6c
   ═══════════════════════════════════════════════════════════════ */
:root {
  --primary: #409EFF;        --primary-light: #ecf5ff;
  --sidebar-bg: #001529;     --sidebar-text: rgba(255,255,255,0.65);
  --sidebar-active: #fff;    --sidebar-indicator: #4091f7;
  --content-bg: #f0f2f5;     --card-bg: #fff;
  --text-primary: #303133;   --text-secondary: #909399;
  --text-muted: #c0c4cc;     --border: #ebeef5;
  --success: #67c23a;        --danger: #f56c6c;
  --warning: #e6a23c;        --info: #909399;
  --radius: 8px;             --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-h: 48px;          --input-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--content-bg); color:var(--text-primary); height:100vh; display:flex; flex-direction:column; font-size:14px; }

/* ── Header ── */
#header { height:var(--header-h); min-height:var(--header-h); background:var(--sidebar-bg); display:flex; align-items:center; padding:0 16px; gap:12px; color:var(--sidebar-active); }
#header .logo { font-size:16px; font-weight:700; color:var(--sidebar-active); letter-spacing:0.5px; }
#header .logo .dot { color:var(--primary); }
#header .badge { font-size:10px; background:rgba(64,158,255,0.2); color:var(--primary); padding:2px 8px; border-radius:10px; }
#header .savings { margin-left:auto; font-size:12px; color:var(--sidebar-text); display:flex; align-items:center; gap:6px; }
#header .savings .pct { color:var(--success); font-weight:700; font-size:16px; }
#header .savings .vs { font-size:10px; color:var(--sidebar-text); }

/* ── Layout ── */
#app-layout { display:flex; flex:1; overflow:hidden; }

/* ── Sidebar ── */
#sidebar { width:240px; min-width:240px; background:var(--sidebar-bg); display:flex; flex-direction:column; overflow:hidden; transition:margin-left 0.2s; }
#sidebar.collapsed { margin-left:-240px; min-width:0; width:0; }
#sidebar-nav { flex:1; overflow-y:auto; padding:12px 0; }
.sidebar-section { padding:0 16px; margin-bottom:4px; }
.sidebar-section .label { font-size:10px; color:var(--sidebar-text); text-transform:uppercase; letter-spacing:1px; padding:8px 0 4px; }
.module-item { padding:8px 16px 8px 24px; cursor:pointer; color:var(--sidebar-text); display:flex; align-items:center; gap:6px; font-size:13px; transition:all 0.15s; border-left:3px solid transparent; }
.module-item:hover { color:var(--sidebar-active); background:rgba(255,255,255,0.04); }
.module-item.active { color:var(--sidebar-active); background:rgba(64,145,247,0.15); border-left-color:var(--sidebar-indicator); }
.module-item .icon { font-size:14px; width:18px; text-align:center; }
.module-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.module-item .count { font-size:10px; color:var(--sidebar-text); background:rgba(255,255,255,0.08); padding:1px 6px; border-radius:4px; }
.page-item { padding:5px 16px 5px 44px; cursor:pointer; color:var(--sidebar-text); font-size:12px; display:flex; align-items:center; gap:6px; transition:all 0.15s; }
.page-item:hover { color:var(--sidebar-active); }
.page-item.active { color:var(--primary); }
.page-item .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.page-item .status-dot.pass { background:var(--success); }
.page-item .status-dot.fail { background:var(--danger); }
.page-item .status-dot.unknown { background:var(--text-muted); }

/* ── Main ── */
#main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--content-bg); position:relative; }
#toggle-sidebar-btn { background:none; border:none; color:var(--sidebar-active); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
#toggle-sidebar-btn:hover { color:var(--primary); }

/* ── Session bar ── */
#session-bar { height:40px; min-height:40px; display:flex; align-items:center; padding:0 16px; gap:6px; border-bottom:1px solid var(--border); background:var(--card-bg); flex-shrink:0; }
#session-bar button { padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:var(--card-bg); font-size:12px; cursor:pointer; color:var(--text-secondary); transition:all 0.15s; }
#session-bar button:hover { border-color:var(--primary); color:var(--primary); }
#session-bar button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
#session-title { font-size:13px; font-weight:600; color:var(--text-primary); margin-left:4px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#session-title .meta { font-size:11px; color:var(--text-secondary); font-weight:400; margin-left:6px; }

/* ── Session panel (slide-over) ── */
#session-panel { position:absolute; right:0; top:40px; bottom:0; width:320px; max-width:90vw; background:var(--card-bg); box-shadow:-4px 0 16px rgba(0,0,0,0.08); z-index:10; display:none; flex-direction:column; border-left:1px solid var(--border); }
#session-panel.open { display:flex; }

/* ── P2-5: Governance Panel ── */
#gov-panel { position:absolute; left:0; top:40px; bottom:0; width:340px; max-width:90vw; background:var(--card-bg); box-shadow:4px 0 16px rgba(0,0,0,0.08); z-index:10; display:none; flex-direction:column; border-right:1px solid var(--border); }
#gov-panel.open { display:flex; }
.gov-section { margin-bottom:16px; }
.gov-section-title { font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.gov-status { font-size:12px; color:var(--text-secondary); padding:4px 0; line-height:1.6; }
.gov-status .ok { color:var(--success); }
.gov-status .warn { color:var(--warning); }
.gov-status .err { color:var(--danger); }
.gov-status .metric { display:flex; justify-content:space-between; padding:2px 0; font-size:11px; }
.gov-status .metric .val { font-weight:600; color:var(--text-primary); }
.gov-action-btn { padding:4px 10px; font-size:11px; border-radius:4px; border:1px solid var(--border); background:var(--card-bg); cursor:pointer; color:var(--text-secondary); transition:all 0.15s; }
.gov-action-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }
.gov-spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.session-panel-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); font-weight:600; font-size:13px; }
.session-panel-header button { background:none; border:none; font-size:16px; cursor:pointer; color:var(--text-secondary); padding:2px 6px; }
.session-panel-header button:hover { color:var(--danger); }
#session-search { margin:8px 16px; padding:6px 10px; border:1px solid var(--border); border-radius:4px; font-size:12px; outline:none; }
#session-search:focus { border-color:var(--primary); }
#session-list { flex:1; overflow-y:auto; }
.session-item { padding:10px 16px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.1s; }
.session-item:hover { background:var(--primary-light); }
.session-item.active { background:var(--primary-light); border-left:3px solid var(--primary); }
.session-item-title { font-size:13px; color:var(--text-primary); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.session-item-meta { font-size:11px; color:var(--text-secondary); }

/* ── Message area ── */
#message-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; background:var(--content-bg); }
.message-list { padding:16px 20px; flex:1; display:flex; flex-direction:column; gap:10px; max-width:960px; margin:0 auto; width:100%; min-height:100%; }
.message-list .empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); margin:auto; }
.message-list .empty-state .icon { font-size:48px; margin-bottom:12px; }
.message-list .empty-state h3 { font-size:16px; color:var(--text-primary); margin-bottom:6px; }
.message-list .empty-state p { font-size:13px; max-width:400px; margin:0 auto; line-height:1.6; }

/* ── Messages ── */
.msg { display:flex; gap:10px; animation:fadeIn 0.25s; }
.msg-user { justify-content:flex-end; }
.msg-assistant, .msg-error, .msg-system { justify-content:flex-start; }
.msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.msg-user .msg-avatar { order:2; background:var(--primary-light); }
.msg-assistant .msg-avatar { background:var(--primary-light); }
.msg-error .msg-avatar { background:#fef0f0; }
.msg-system .msg-avatar { background:none; }
.msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.6; }
.msg-user .msg-bubble { background:var(--primary-light); border-bottom-right-radius:4px; color:var(--text-primary); }
.msg-assistant .msg-bubble { background:var(--card-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg-error .msg-bubble { background:#fef0f0; border:1px solid #fde2e2; border-bottom-left-radius:4px; color:var(--danger); }
.msg-system .msg-bubble { background:none; border:none; color:var(--text-secondary); font-size:12px; padding:4px 0; }
.msg-meta { font-size:11px; color:var(--text-muted); margin-top:4px; display:flex; gap:8px; }
.msg-text { white-space:pre-wrap; word-break:break-word; }
.msg-text code { background:#f4f4f5; padding:1px 5px; border-radius:3px; font-size:12px; }

/* Loading skeleton */
.msg-assistant.loading .msg-bubble::after { content:' ...'; animation:dots 1.5s steps(4) infinite; }
@keyframes dots { 0%{opacity:0.2} 50%{opacity:1} 100%{opacity:0.2} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── Skill block ── */
.skill-block { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin:4px 0; }
.skill-header { padding:8px 12px; display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.skill-header:hover { background:rgba(0,0,0,0.02); }
.skill-icon { font-size:14px; width:18px; text-align:center; }
.skill-name { font-size:12px; font-weight:600; flex:1; }
.skill-status { font-size:10px; padding:2px 6px; border-radius:3px; font-weight:600; white-space:nowrap; }
.skill-status.running { background:#e6f7ff; color:#1890ff; }
.skill-status.pass { background:#f0f9eb; color:var(--success); }
.skill-status.fail { background:#fef0f0; color:var(--danger); }
.skill-progress { width:60px; height:4px; background:var(--border); border-radius:2px; flex-shrink:0; }
.skill-progress-fill { height:100%; background:var(--primary); border-radius:2px; transition:width 0.3s; }
.skill-body { padding:0 12px 8px; display:none; }
.skill-block.expanded .skill-body { display:block; }
.skill-stream { font-family:'Cascadia Code',Consolas,monospace; font-size:12px; color:var(--text-secondary); line-height:1.5; white-space:pre-wrap; max-height:240px; overflow-y:auto; background:#fafafa; padding:8px; border-radius:4px; }
.skill-footer { padding:6px 12px 8px; display:flex; align-items:center; gap:10px; border-top:1px solid var(--border); font-size:12px; }
.skill-badge { padding:2px 6px; border-radius:3px; font-weight:600; font-size:10px; }
.skill-badge.pass { background:#f0f9eb; color:var(--success); }
.skill-badge.fail { background:#fef0f0; color:var(--danger); }
.skill-summary { color:var(--text-secondary); flex:1; font-size:12px; }
.skill-tokens { color:var(--text-muted); font-size:10px; white-space:nowrap; }

/* ── Result card ── */
.result-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; border-left:4px solid var(--primary); margin:4px 0; }
.result-card.pass { border-left-color:var(--success); }
.result-card.fail { border-left-color:var(--danger); }
.result-header { padding:10px 14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
.result-icon { font-size:18px; }
.result-title { font-weight:600; font-size:13px; flex:1; }
.result-time { font-size:12px; color:var(--text-secondary); }
.result-stats { padding:10px 14px; display:flex; gap:20px; }
.result-stats .stat { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-secondary); }
.result-stats .stat .num { font-weight:700; font-size:16px; }
.result-stats .stat.pass .num { color:var(--success); }
.result-stats .stat.fail .num { color:var(--danger); }
.result-stats .stat.skip .num { color:var(--warning); }
.result-actions { padding:8px 14px 10px; display:flex; gap:8px; }
.result-actions button { padding:5px 12px; border-radius:4px; border:1px solid var(--border); background:var(--card-bg); color:var(--text-primary); font-size:12px; cursor:pointer; transition:all 0.15s; }
.result-actions button:hover { border-color:var(--primary); color:var(--primary); }
.result-actions button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ── Interaction inline ── */
.interaction-inline { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; background:#fff7e6; border:1px solid #ffe58f; border-radius:var(--radius); margin:4px 0; animation:fadeIn 0.25s; }
.int-icon { font-size:16px; flex-shrink:0; }
.int-content { flex:1; }
.int-prompt { font-size:13px; color:var(--text-primary); margin-bottom:6px; }
.int-actions { display:flex; gap:6px; }
.int-actions button { padding:4px 12px; border-radius:4px; border:none; font-size:12px; cursor:pointer; color:#fff; }
.int-actions .int-approve { background:var(--success); }
.int-actions .int-reject { background:var(--danger); }
.int-actions .int-skip { background:var(--warning); }
.interaction-inline.resolved { opacity:0.65; pointer-events:none; }
.interaction-inline.resolved .int-actions button { display:none; }
.interaction-inline.resolved .int-prompt::after { content:' ✓ 已处理'; color:var(--success); font-weight:600; }

/* ── Input bar ── */
#input-bar { height:var(--input-h); min-height:var(--input-h); background:var(--card-bg); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; }
#input-bar .quick-actions { display:flex; gap:6px; }
#input-bar .quick-btn { padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:var(--card-bg); color:var(--text-secondary); font-size:11px; cursor:pointer; white-space:nowrap; }
#input-bar .quick-btn:hover { border-color:var(--primary); color:var(--primary); }
#command-input { flex:1; border:none; outline:none; font-size:14px; color:var(--text-primary); background:transparent; }
#command-input::placeholder { color:var(--text-muted); }
#execute-btn { padding:8px 20px; border-radius:4px; border:none; background:var(--primary); color:#fff; font-size:13px; font-weight:600; cursor:pointer; }
#execute-btn:hover { opacity:0.85; }
#execute-btn:disabled { opacity:0.5; cursor:not-allowed; }
#selected-info { font-size:12px; color:var(--text-secondary); white-space:nowrap; }

/* ── Utility ── */
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(64,158,255,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── Responsive ── */
@media (max-width:768px) {
  .message-list { padding:8px 12px; }
  .msg-bubble { max-width:90%; }
  #input-bar .quick-actions { display:none; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div id="header">
  <button id="toggle-sidebar-btn" onclick="toggleSidebar()">☰</button>
  <span class="logo">AITest<span class="dot">.</span> 工作台</span>
  <span class="badge">v0.5</span>
  <span class="savings">
    Token 节省 <span class="pct">44%</span>↓
    <span class="vs">vs Claude Code</span>
  </span>
</div>

<!-- ═══ LAYOUT ═══ -->
<div id="app-layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-nav">
      <div class="sidebar-section">
        <div class="label">项目模块</div>
      </div>
      <div id="module-tree">
        <div style="padding:20px;text-align:center;color:var(--sidebar-text);font-size:12px;">加载中...</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main-area">
    <!-- Session bar -->
    <div id="session-bar">
      <button onclick="createNewSession()" title="新建会话">+ 新会话</button>
      <button onclick="toggleSessionPanel()" title="会话历史">📋 历史</button>
      <button onclick="toggleGovPanel()" title="治理面板" style="color:var(--warning);">🛡 治理</button>
      <span id="session-title">当前会话<span class="meta" id="session-meta"></span></span>
    </div>

    <!-- Session panel (slide-over) -->
    <div id="session-panel">
      <div class="session-panel-header">
        <span>会话历史</span>
        <button onclick="toggleSessionPanel()">✕</button>
      </div>
      <input id="session-search" placeholder="搜索会话..." oninput="filterSessionList(this.value)">
      <div id="session-list">
        <div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">加载中...</div>
      </div>
    </div>

    <!-- Governance panel (P2-5: slide-over) -->
    <div id="gov-panel">
      <div class="session-panel-header">
        <span>🛡 治理面板</span>
        <button onclick="toggleGovPanel()">✕</button>
      </div>
      <div style="padding:12px 16px;overflow-y:auto;flex:1;">
        <div class="gov-section">
          <div class="gov-section-title">📊 状态审计</div>
          <div id="gov-state-status" class="gov-status">选择模块后显示</div>
        </div>
        <div class="gov-section">
          <div class="gov-section-title">📋 SOP 合规</div>
          <div id="gov-sop-status" class="gov-status">运行 SOP 后更新</div>
        </div>
        <div class="gov-section">
          <div class="gov-section-title">💰 成本概况 (7天)</div>
          <div id="gov-cost-status" class="gov-status">加载中...</div>
        </div>
        <div class="gov-section">
          <div class="gov-section-title">⚡ 快速操作</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            <button class="gov-action-btn" onclick="runGovAudit('state')">🔍 状态审计</button>
            <button class="gov-action-btn" onclick="runGovAudit('sop')">✅ SOP 审计</button>
            <button class="gov-action-btn" onclick="runGovAudit('cost')">💰 成本审计</button>
            <button class="gov-action-btn" onclick="refreshGovPanel()">🔄 刷新</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Message area (persistent) -->
    <div id="message-area">
      <div class="message-list" id="message-list">
        <div class="empty-state">
          <div class="icon">📋</div>
          <h3>选择模块开始测试</h3>
          <p>左侧选择模块和页面，下方输入指令或点击快捷操作按钮。<br>支持：自动化测试 / Bug 分析 / 完整 SOP 流水线。</p>
        </div>
      </div>
    </div>

    <!-- Input bar -->
    <div id="input-bar">
      <div class="quick-actions" id="quick-actions">
        <button class="quick-btn" onclick="quickCmd('自动化测试')">⚡ 写测试</button>
        <button class="quick-btn" onclick="quickCmd('完整流程')">🔄 完整流程</button>
        <button class="quick-btn" onclick="quickCmd('bug分析')">🐛 Bug分析</button>
        <button class="quick-btn" onclick="quickCmd('查看状态')">📊 查看状态</button>
      </div>
      <span id="selected-info"></span>
      <input id="command-input" placeholder="输入指令... (选择模块后可直接写测试)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();executeCommand();}">
      <button id="execute-btn" onclick="executeCommand()">执行</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const API = '/api/chat';
const SESSIONS_API = '/api/sessions';
let sessionId = null;
let eventSource = null;
let selectedModule = null;
let selectedPage = null;
let sidebarCollapsed = false;

// Message system
let messages = [];
let streamingState = { active: false, skillBlockId: null, assistantMsgId: null };
let pendingInteractionId = null;
let runStats = { pass: 0, fail: 0, skip: 0, total: 0 };

// Session management
let sessionList = [];
let showSessionPanel = false;
let msgIdCounter = 0;
function nextMsgId() { return 'm' + (++msgIdCounter); }

// ═══════════════════════════════════════════════════════════
// Sidebar: Module tree (unchanged)
// ═══════════════════════════════════════════════════════════
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
}

async function loadModuleTree() {
  try {
    const resp = await fetch('/api/agent/status/all');
    const data = await resp.json();
    renderModuleTree(data.modules || data);

}

function renderModuleTree(data) {
  const tree = document.getElementById('module-tree');
  const modules = typeof data === 'object' ? Object.keys(data) : [];
  if (modules.length === 0) { loadModuleTreeFallback(); return; }
  let html = '<div class="sidebar-section"><div class="label">项目模块</div></div>';
  modules.forEach(mod => {
    const pages = data[mod] || [];
    html += `<div class="module-item" onclick="selectModule('${mod}')" data-module="${mod}">
      <span class="icon">📁</span><span class="name">${mod}</span><span class="count">${pages.length}</span>
    </div>`;
    pages.forEach(p => {
      html += `<div class="page-item" onclick="selectPage('${mod}','${p}')" data-page="${p}">
        <span class="status-dot unknown"></span>${p}
      </div>`;
    });
  });
  tree.innerHTML = html;
}

function selectModule(mod) {
  selectedModule = mod;
  selectedPage = null;
  document.querySelectorAll('.module-item,.page-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-module="${mod}"]`)?.classList.add('active');
  document.getElementById('selected-info').textContent = `模块: ${mod}`;
  document.getElementById('command-input').placeholder = `为 ${mod} 模块执行操作...`;
  appendSystemMessage(`上下文: ${mod} 模块`);
}

function selectPage(mod, page) {
  selectedModule = mod;
  selectedPage = page;
  document.querySelectorAll('.module-item,.page-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-module="${mod}"]`)?.classList.add('active');
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  document.getElementById('selected-info').textContent = `${mod} / ${page}`;
  document.getElementById('command-input').placeholder = `输入指令 (${mod}/${page})...`;
  appendSystemMessage(`上下文: ${mod} / ${page}`);
}

// ═══════════════════════════════════════════════════════════
// Message rendering
// ═══════════════════════════════════════════════════════════
function formatTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

function scrollToBottom() {
  const area = document.getElementById('message-area');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function hideEmptyState() {
  const es = document.querySelector('.message-list .empty-state');
  if (es) es.style.display = 'none';
}

function showEmptyState() {
  const es = document.querySelector('.message-list .empty-state');
  if (es) es.style.display = '';
}

function appendToMessageList(html) {
  hideEmptyState();
  const container = document.getElementById('message-list');
  const wrapper = container.querySelector('.messages-wrapper');
  if (wrapper) {
    wrapper.insertAdjacentHTML('beforeend', html);
  } else {
    container.innerHTML = '<div class="messages-wrapper">' + html + '</div>';
  }
  scrollToBottom();
}

function replaceElement(id, html) {
  const el = document.getElementById(id);
  if (el) { el.outerHTML = html; scrollToBottom(); }
}

function appendSystemMessage(text) {
  const id = nextMsgId();
  const html = `<div class="msg msg-system" id="${id}"><div class="msg-bubble">${escapeHtml(text)}</div></div>`;
  appendToMessageList(html);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// User message
function appendUserMessage(text) {
  const id = nextMsgId();
  const mod = selectedModule || '';
  const page = selectedPage || '';
  const ctx = mod && page ? `<span class="msg-context">${mod} / ${page}</span>` : '';
  const html = `<div class="msg msg-user" id="${id}">
    <div class="msg-avatar">👤</div>
    <div class="msg-bubble">
      <div class="msg-text">${escapeHtml(text)}</div>
      <div class="msg-meta"><span class="msg-time">${formatTime()}</span>${ctx}</div>
    </div>
  </div>`;
  messages.push({ id, role: 'user', content: text, timestamp: Date.now() });
  appendToMessageList(html);
  document.getElementById('command-input').value = '';
}

// Assistant skeleton (loading dots)
function appendAssistantSkeleton() {
  const id = nextMsgId();
  streamingState.assistantMsgId = id;
  const html = `<div class="msg msg-assistant loading" id="${id}">
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">执行中</div>
  </div>`;
  appendToMessageList(html);
}

function finalizeAssistantMessage(text) {
  const id = streamingState.assistantMsgId;
  if (!id) return;
  const html = `<div class="msg msg-assistant" id="${id}">
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="msg-text">${escapeHtml(text)}</div></div>
  </div>`;
  replaceElement(id, html);
  streamingState.assistantMsgId = null;
}

// Skill block
function createSkillBlock(skillId, label, progress) {
  streamingState.skillBlockId = 'sk-' + nextMsgId();
  const pct = progress ? Math.round(progress.step / progress.total * 100) : 0;
  const html = `<div class="skill-block expanded" id="${streamingState.skillBlockId}">
    <div class="skill-header" onclick="this.parentElement.classList.toggle('expanded')">
      <span class="skill-icon">⚙️</span>
      <span class="skill-name">${escapeHtml(label || skillId)}</span>
      <span class="skill-status running">执行中</span>
      <div class="skill-progress"><div class="skill-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="skill-body"><pre class="skill-stream"></pre></div>
    <div class="skill-footer" style="display:none">
      <span class="skill-badge"></span>
      <span class="skill-summary"></span>
      <span class="skill-tokens"></span>
    </div>
  </div>`;
  appendToMessageList(html);
  return streamingState.skillBlockId;
}

function appendStreamChunk(text) {
  const blockId = streamingState.skillBlockId;
  if (!blockId) return;
  const stream = document.querySelector(`#${blockId} .skill-stream`);
  if (stream) {
    stream.textContent += text;
    stream.scrollTop = stream.scrollHeight;
  }
  scrollToBottom();
}

function finalizeSkillBlock(skillId, status, summary, tokenUsage) {
  const blockId = streamingState.skillBlockId;
  if (!blockId) return;
  const block = document.getElementById(blockId);
  if (!block) return;

  const statusEl = block.querySelector('.skill-status');
  statusEl.className = 'skill-status ' + status;
  statusEl.textContent = status === 'pass' ? '✓ 通过' : (status === 'fail' ? '✗ 失败' : '⊘ 跳过');

  const fill = block.querySelector('.skill-progress-fill');
  if (fill) fill.style.width = '100%';

  const footer = block.querySelector('.skill-footer');
  if (footer) {
    footer.style.display = 'flex';
    const badge = footer.querySelector('.skill-badge');
    badge.className = 'skill-badge ' + status;
    badge.textContent = status === 'pass' ? '✓ 通过' : (status === 'fail' ? '✗ 失败' : '⊘ 跳过');
    footer.querySelector('.skill-summary').textContent = (summary || '').slice(0, 300);
    if (tokenUsage?.total || tokenUsage?.input) {
      const total = tokenUsage.total || (tokenUsage.input || 0) + (tokenUsage.output || 0);
      footer.querySelector('.skill-tokens').textContent = 'Tokens: ' + total.toLocaleString();
    }
  }

  // Track stats
  runStats.total++;
  if (status === 'pass') runStats.pass++;
  else if (status === 'fail') runStats.fail++;
  else runStats.skip++;

  streamingState.skillBlockId = null;
}

// Result card
function appendResultCard(success, summary, stats) {
  stats = stats || runStats;
  const id = 'res-' + nextMsgId();
  const cls = 'result-card ' + (success ? 'pass' : 'fail');
  const mod = selectedModule || '';
  const page = selectedPage || '';
  const html = `<div class="${cls}" id="${id}">
    <div class="result-header">
      <span class="result-icon">${success ? '✅' : '❌'}</span>
      <span class="result-title">${escapeHtml(summary || (success ? '执行完成' : '执行失败'))}</span>
      <span class="result-time">${formatTime()}</span>
    </div>
    <div class="result-stats">
      <div class="stat pass"><span class="num">${stats.pass}</span> 通过</div>
      <div class="stat fail"><span class="num">${stats.fail}</span> 失败</div>
      <div class="stat skip"><span class="num">${stats.skip}</span> 跳过</div>
      <div class="stat" style="color:var(--text-secondary)"><span class="num" style="color:var(--text-primary);font-weight:700;font-size:16px;">${stats.total}</span> 总计</div>
    </div>
    ${mod && page ? `<div class="result-actions">
      <button onclick="quickCmd('bug分析 ${mod}/${page}')">🐛 查看 Bug</button>
      <button class="primary" onclick="quickCmd('重新执行 ${mod}/${page}')">🔄 重新执行</button>
    </div>` : ''}
  </div>`;
  messages.push({ id, role: 'assistant', type: 'result', success, summary, stats: { ...stats } });
  appendToMessageList(html);
}

// Error message
function appendErrorMessage(text) {
  const id = nextMsgId();
  const html = `<div class="msg msg-error" id="${id}">
    <div class="msg-avatar">❌</div>
    <div class="msg-bubble"><div class="msg-text">${escapeHtml(text)}</div></div>
  </div>`;
  messages.push({ id, role: 'assistant', type: 'error', content: text });
  appendToMessageList(html);
}

// Interaction inline
function appendInteractionBanner(interactionId, prompt, options) {
  const id = 'int-' + nextMsgId();
  const buttons = (options || ['approve', 'reject', 'skip']).map(opt => {
    const cls = opt === 'approve' ? 'int-approve' : (opt === 'reject' ? 'int-reject' : 'int-skip');
    const label = opt === 'approve' ? '✓ 批准' : (opt === 'reject' ? '✗ 拒绝' : '⏭ 跳过');
    return `<button class="${cls}" onclick="respondInteraction('${opt}')">${label}</button>`;
  }).join('');
  const html = `<div class="interaction-inline" id="${id}">
    <div class="int-icon">⚠️</div>
    <div class="int-content">
      <div class="int-prompt">${escapeHtml(prompt)}</div>
      <div class="int-actions">${buttons}</div>
    </div>
  </div>`;
  appendToMessageList(html);
}

function resolveInteractionBanner() {
  const banners = document.querySelectorAll('.interaction-inline:not(.resolved)');
  banners.forEach(b => b.classList.add('resolved'));
}

// ═══════════════════════════════════════════════════════════
// Interaction
// ═══════════════════════════════════════════════════════════
function respondInteraction(response) {
  if (!pendingInteractionId || !sessionId) return;
  fetch(`${API}/sessions/${sessionId}/interact`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ interaction_id: pendingInteractionId, response }),
  }).catch(() => {});
  resolveInteractionBanner();
  pendingInteractionId = null;
}

// ═══════════════════════════════════════════════════════════
// Session management
// ═══════════════════════════════════════════════════════════
async function createNewSession() {
  // Close current SSE
  if (eventSource) { eventSource.close(); eventSource = null; }

  try {
    const resp = await fetch(`${API}/sessions`, { method: 'POST' });
    const data = await resp.json();
    sessionId = data.session_id;
  } catch (e) {
    sessionId = 'chat-' + Math.random().toString(36).slice(2, 10);
  }

  // Reset
  messages = [];
  runStats = { pass: 0, fail: 0, skip: 0, total: 0 };
  streamingState = { active: false, skillBlockId: null, assistantMsgId: null };
  pendingInteractionId = null;
  msgIdCounter = 0;

  // Clear message list
  const container = document.getElementById('message-list');
  container.innerHTML = `<div class="empty-state">
    <div class="icon">📋</div>
    <h3>新会话</h3>
    <p>选择模块和页面，输入指令开始。</p>
  </div>`;

  // Update session bar
  document.getElementById('session-title').innerHTML = '当前会话<span class="meta" id="session-meta"></span>';
  document.getElementById('session-meta').textContent = '';

  updateSessionMeta();
}

async function updateSessionMeta() {
  try {
    const resp = await fetch(`${API}/sessions/${sessionId}/history`);
    const data = await resp.json();
    const count = data.messages?.length || 0;
    document.getElementById('session-meta').textContent = `· ${count} 条消息`;
  } catch { /* ignore */ }
}

async function toggleSessionPanel() {
  showSessionPanel = !showSessionPanel;
  const panel = document.getElementById('session-panel');
  panel.classList.toggle('open', showSessionPanel);
  if (showSessionPanel) {
    await loadSessionListUI();
  }
}

async function loadSessionListUI() {
  const list = document.getElementById('session-list');
  try {
    const resp = await fetch(`${SESSIONS_API}/?limit=50`);
    const sessions = await resp.json();
    sessionList = sessions;
    renderSessionList(sessions);
  } catch {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">加载失败</div>';
  }
}

function renderSessionList(items) {
  const list = document.getElementById('session-list');
  if (!items.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">暂无历史会话</div>';
    return;
  }
  list.innerHTML = items.map(s => {
    const title = s.title || '未命名会话';
    const date = new Date(s.created_at).toLocaleDateString('zh-CN');
    const time = new Date(s.created_at).toLocaleTimeString('zh-CN', { hour12: false });
    return `<div class="session-item" onclick="switchToPastSession('${s.id}')">
      <div class="session-item-title">${escapeHtml(title)}</div>
      <div class="session-item-meta">${s.message_count || 0} 条消息 · ${date} ${time}</div>
    </div>`;
  }).join('');
}

function filterSessionList(query) {
  const filtered = query ? sessionList.filter(s =>
    (s.title || '').toLowerCase().includes(query.toLowerCase())
  ) : sessionList;
  renderSessionList(filtered);
}

async function switchToPastSession(uuid) {
  try {
    const resp = await fetch(`${SESSIONS_API}/${uuid}`);
    const session = await resp.json();
    const msgs = session.messages || [];

    // Close current SSE
    if (eventSource) { eventSource.close(); eventSource = null; }

    sessionId = 'chat-' + uuid.substring(0, 8);
    try {
      const cresp = await fetch(`${API}/sessions`, { method: 'POST' });
      sessionId = (await cresp.json()).session_id;
    } catch { /* keep fallback */ }

    messages = [];
    runStats = { pass: 0, fail: 0, skip: 0, total: 0 };
    streamingState = { active: false, skillBlockId: null, assistantMsgId: null };
    msgIdCounter = 0;

    const container = document.getElementById('message-list');
    if (!msgs.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="icon">📋</div><h3>空会话</h3><p>此会话没有消息。</p>
      </div>`;
    } else {
      // Rebuild
      let html = '<div class="messages-wrapper">';
      msgs.forEach(m => {
        const id = nextMsgId();
        if (m.role === 'user') {
          html += `<div class="msg msg-user" id="${id}">
            <div class="msg-avatar">👤</div>
            <div class="msg-bubble"><div class="msg-text">${escapeHtml(m.content)}</div>
            <div class="msg-meta"><span class="msg-time">${formatTime()}</span></div></div>
          </div>`;
        } else if (m.role === 'assistant') {
          html += `<div class="msg msg-assistant" id="${id}">
            <div class="msg-avatar">🤖</div>
            <div class="msg-bubble"><div class="msg-text">${escapeHtml(m.content || '')}</div></div>
          </div>`;
        }
        messages.push({ id, ...m });
      });
      html += '</div>';
      container.innerHTML = html;
    }

    document.getElementById('session-title').innerHTML =
      `${escapeHtml(session.title || '历史会话')}<span class="meta" id="session-meta"> · ${msgs.length} 条消息</span>`;

    toggleSessionPanel();
    showEmptyState();
  } catch (e) {
    alert('加载会话失败: ' + e.message);
  }
}

// ═══════════════════════════════════════════════════════════
// Execution
// ═══════════════════════════════════════════════════════════
function quickCmd(action) {
  const input = document.getElementById('command-input');
  if (selectedModule && selectedPage) {
    input.value = `${action} ${selectedModule}/${selectedPage}`;
  } else {
    input.value = action;
  }
  executeCommand();
}

async function executeCommand(cmd) {
  const input = document.getElementById('command-input');
  const text = (cmd || input.value).trim();
  if (!text) return;

  input.value = text;
  const btn = document.getElementById('execute-btn');
  btn.disabled = true;
  streamingState.active = true;
  runStats = { pass: 0, fail: 0, skip: 0, total: 0 };

  // Build full command
  let fullCmd = text;
  if (selectedModule && selectedPage && !text.includes('/')) {
    fullCmd = `${text} ${selectedModule}/${selectedPage}`;
  }

  // Append user message
  appendUserMessage(fullCmd);

  try {
    if (!sessionId) {
      const resp = await fetch(`${API}/sessions`, { method: 'POST' });
      sessionId = (await resp.json()).session_id;
    }

    const resp = await fetch(`${API}/sessions/${sessionId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: fullCmd }),
    });
    const msgData = await resp.json();

    // Assistant skeleton
    appendAssistantSkeleton();

    // Close previous SSE
    if (eventSource) { eventSource.close(); eventSource = null; }

    // Connect SSE
    connectSSE(sessionId, msgData.message_id);

  } catch (e) {
    appendErrorMessage('请求失败: ' + e.message);
    btn.disabled = false;
    streamingState.active = false;
  }
}

// ═══════════════════════════════════════════════════════════
// SSE connection
// ═══════════════════════════════════════════════════════════
function connectSSE(sid, mid) {
  eventSource = new EventSource(`${API}/sessions/${sid}/stream/${mid}`);

  eventSource.addEventListener('message', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'text') {
        finalizeAssistantMessage(data.content);
      }
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('chunk', e => {
    try {
      const data = JSON.parse(e.data);
      // If no skill block active yet, it's a general chat chunk
      if (streamingState.skillBlockId) {
        appendStreamChunk(data.content);
      } else if (streamingState.assistantMsgId) {
        // Accumulate in assistant message
        const el = document.getElementById(streamingState.assistantMsgId);
        if (el) {
          const bubble = el.querySelector('.msg-text') || el.querySelector('.msg-bubble');
          if (bubble) bubble.textContent += data.content;
          scrollToBottom();
        }
      }
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('skill_start', e => {
    try {
      const data = JSON.parse(e.data);
      finalizeAssistantMessage(''); // Remove skeleton
      createSkillBlock(data.skill_id, data.label || data.skill_id, data.progress);
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('skill_end', e => {
    try {
      const data = JSON.parse(e.data);
      finalizeSkillBlock(data.skill_id, data.status || 'pass', data.summary, data.token_usage);
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('sop_phase', e => {
    try {
      const data = JSON.parse(e.data);
      // If no skill block active, treat as skill start
      if (!streamingState.skillBlockId) {
        finalizeAssistantMessage('');
        createSkillBlock(data.phase_id || 'sop-phase', data.content, data.progress);
      }
      appendStreamChunk(data.content + '\n');
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('interaction', e => {
    try {
      const data = JSON.parse(e.data);
      pendingInteractionId = data.interaction_id;
      appendInteractionBanner(data.interaction_id, data.prompt, data.options);
    } catch { /* ignore */ }
  });

  eventSource.addEventListener('done', e => {
    try {
      const data = JSON.parse(e.data);
      // Finalize any active skill block
      if (streamingState.skillBlockId) {
        finalizeSkillBlock('', data.success ? 'pass' : 'fail', data.summary, {});
      }
      finalizeAssistantMessage('');
      appendResultCard(data.success !== false, data.summary, runStats);
    } catch { /* ignore */ }
    disconnectSSE();
    document.getElementById('execute-btn').disabled = false;
    streamingState.active = false;
    updateSessionMeta();
  });

  eventSource.addEventListener('error', e => {
    // Only treat as error if there's actual data attached
    if (e.data) {
      try {
        const data = JSON.parse(e.data);
        appendErrorMessage(data.message || '执行错误');
      } catch { /* ignore */ }
      disconnectSSE();
      document.getElementById('execute-btn').disabled = false;
      streamingState.active = false;
    }
    // Else: EventSource will auto-retry — don't close
  });
}

function disconnectSSE() {
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
(async function init() {
  // Load module tree
  try {
    const resp = await fetch('/api/agent/status/all');
    if (resp.ok) {
      const data = await resp.json();
      renderModuleTree(data.modules || data);
    } else {
      await loadModuleTreeFallback();
    }
  } catch {
    await loadModuleTreeFallback();
  }

  // Create initial session
  try {
    const resp = await fetch(`${API}/sessions`, { method: 'POST' });
    sessionId = (await resp.json()).session_id;
  } catch (e) { console.log('Session init:', e); }

  // P2-5: Load initial governance data
  setTimeout(refreshGovPanel, 1000);
})();

// ═══════════════════════════════════════════════════════════
//  P2-5: Governance Panel
// ═══════════════════════════════════════════════════════════

let govPanelOpen = false;

function toggleGovPanel() {
  govPanelOpen = !govPanelOpen;
  document.getElementById('gov-panel').classList.toggle('open', govPanelOpen);
  if (govPanelOpen) refreshGovPanel();
}

async function refreshGovPanel() {
  const activeModule = getActiveModule();
  if (activeModule) {
    // Fetch state audit for active module
    try {
      const resp = await fetch(`/api/audit/state?module=${activeModule}`);
      if (resp.ok) {
        const data = await resp.json();
        renderStateAudit(data);
      }
    } catch (e) { document.getElementById('gov-state-status').innerHTML = '<span class="warn">无法加载</span>'; }

    // Fetch SOP audit
    try {
      const resp = await fetch(`/api/audit/sop?module=${activeModule}&days=7`);
      if (resp.ok) {
        const data = await resp.json();
        renderSOPAudit(data);
      }
    } catch (e) { document.getElementById('gov-sop-status').innerHTML = '<span class="warn">无法加载</span>'; }
  }

  // Fetch cost overview (global)
  try {
    const resp = await fetch('/api/audit/cost?days=7');
    if (resp.ok) {
      const data = await resp.json();
      renderCostAudit(data);
    }
  } catch (e) { document.getElementById('gov-cost-status').innerHTML = '<span class="warn">无法加载</span>'; }
}

function getActiveModule() {
  const active = document.querySelector('.module-item.active');
  return active ? active.dataset.module : '';
}

function renderStateAudit(data) {
  const el = document.getElementById('gov-state-status');
  const status = data.overall_status || 'ok';
  const icon = status === 'ok' ? '✅' : status === 'warning' ? '⚠️' : '❌';
  const cls = status === 'ok' ? 'ok' : status === 'warning' ? 'warn' : 'err';

  let html = `<span class="${cls}">${icon} ${status.toUpperCase()}</span>`;
  html += `<div class="metric"><span>漂移数</span><span class="val">${data.drift_count || 0}</span></div>`;
  html += `<div class="metric"><span>错误</span><span class="val" style="color:var(--danger)">${data.error_count || 0}</span></div>`;
  html += `<div class="metric"><span>警告</span><span class="val" style="color:var(--warning)">${data.warning_count || 0}</span></div>`;

  if (data.drifts && data.drifts.length > 0) {
    html += '<div style="margin-top:8px;font-size:10px;color:var(--text-secondary);">';
    data.drifts.slice(0, 3).forEach(d => {
      html += `<div style="padding:2px 0;">• ${d.description.substring(0, 60)}...</div>`;
    });
    if (data.drifts.length > 3) html += `<div>... 共 ${data.drifts.length} 条</div>`;
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderSOPAudit(data) {
  const el = document.getElementById('gov-sop-status');
  const compliance = data.overall_compliance != null ? (data.overall_compliance * 100).toFixed(0) + '%' : '--';
  const cls = data.total_violations === 0 ? 'ok' : data.error_count > 0 ? 'err' : 'warn';
  const icon = data.total_violations === 0 ? '✅' : '⚠️';

  let html = `<span class="${cls}">${icon} 合规率 ${compliance}</span>`;
  html += `<div class="metric"><span>违规</span><span class="val" style="color:${data.error_count > 0 ? 'var(--danger)' : 'var(--text-primary)'}">${data.total_violations || 0}</span></div>`;
  html += `<div class="metric"><span>错误</span><span class="val">${data.error_count || 0}</span></div>`;

  if (data.violations && data.violations.length > 0) {
    html += '<div style="margin-top:4px;font-size:10px;color:var(--text-secondary);">';
    data.violations.slice(0, 3).forEach(v => {
      html += `<div style="padding:2px 0;">• [${v.check_type || '?'}] ${v.detail.substring(0, 50)}...</div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderCostAudit(data) {
  const el = document.getElementById('gov-cost-status');
  const cost = (data.total_cost || 0).toFixed(4);
  const alerts = data.alert_count || 0;
  const cls = alerts === 0 ? 'ok' : alerts > 2 ? 'err' : 'warn';
  const icon = alerts === 0 ? '✅' : '⚠️';

  let html = `<span class="${cls}">${icon} $${cost} (${data.total_events || 0} events)</span>`;
  html += `<div class="metric"><span>告警</span><span class="val" style="color:${alerts > 2 ? 'var(--danger)' : 'var(--text-primary)'}">${alerts}</span></div>`;

  if (data.trends && data.trends.length > 0) {
    html += '<div style="margin-top:4px;font-size:10px;color:var(--text-secondary);">';
    data.trends.slice(0, 3).forEach(t => {
      html += `<div style="padding:1px 0;">• ${t.skill_id}: $${t.total_cost.toFixed(3)}</div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

async function runGovAudit(type) {
  const module = getActiveModule();
  if (!module && type !== 'cost') {
    alert('请先在左侧选择一个模块');
    return;
  }

  const statusEl = document.getElementById(`gov-${type}-status`);
  statusEl.innerHTML = '<span class="gov-spinner"></span> 审计中...';

  try {
    let url;
    if (type === 'state') url = `/api/audit/state?module=${module}`;
    else if (type === 'sop') url = `/api/audit/sop?module=${module}&days=7`;
    else if (type === 'cost') url = '/api/audit/cost?days=7';

    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (type === 'state') renderStateAudit(data);
      else if (type === 'sop') renderSOPAudit(data);
      else if (type === 'cost') renderCostAudit(data);
    } else {
      statusEl.innerHTML = '<span class="warn">审计失败</span>';
    }
  } catch (e) {
    statusEl.innerHTML = `<span class="err">错误: ${e.message}</span>`;
  }
}
</script>
