<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLO — Testing Lifecycle Orchestrator</title>
<style>
/* ═══════════════════════════════════════════════════════
   TLO Design Tokens — 借鉴 Aperant globals.css
   ═══════════════════════════════════════════════════════ */
:root {
  --background: #f8f9fb;
  --foreground: #1a1a2e;
  --card: #ffffff;
  --card-foreground: #1a1a2e;
  --border: #e2e4e9;
  --input: #e2e4e9;
  --ring: #5b7fff;
  --primary: #5b7fff;
  --primary-foreground: #ffffff;
  --secondary: #f0f1f5;
  --secondary-foreground: #1a1a2e;
  --muted: #f5f5f7;
  --muted-foreground: #6b7280;
  --accent: #eef0ff;
  --accent-foreground: #5b7fff;
  --success: #22c55e;
  --success-foreground: #ffffff;
  --success-light: #e6f9ed;
  --warning: #f59e0b;
  --warning-foreground: #1a1a2e;
  --warning-light: #fff8e6;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;
  --destructive-light: #fef0f0;
  --info: #3b82f6;
  --info-foreground: #ffffff;
  --info-light: #e8f2ff;
  --sidebar-bg: #0f1420;
  --sidebar-fg: #868f97;
  --sidebar-active: #5b7fff;
  --sidebar-hover: #1a1f2e;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08);
  --shadow-focus: 0 0 0 3px rgba(91,127,255,0.2);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --sidebar-width: 220px;
  --header-height: 48px;
}
.dark {
  --background: #0b0b0f;
  --foreground: #e6e6e6;
  --card: #121216;
  --card-foreground: #e6e6e6;
  --border: #23262b;
  --input: #23262b;
  --ring: #818cf8;
  --primary: #818cf8;
  --primary-foreground: #0b0b0f;
  --secondary: #1a1a1f;
  --secondary-foreground: #e6e6e6;
  --muted: #1a1a1f;
  --muted-foreground: #868f97;
  --accent: #1e2040;
  --accent-foreground: #818cf8;
  --success: #4ebe96;
  --success-light: #1a2924;
  --warning: #d2d714;
  --warning-light: #262618;
  --destructive: #ff5c5c;
  --destructive-light: #2a1a1a;
  --info: #479ffa;
  --info-light: #1a2230;
  --sidebar-bg: #0a0a10;
  --sidebar-fg: #868f97;
  --sidebar-active: #818cf8;
  --sidebar-hover: #141420;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.6);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.7);
  --shadow-focus: 0 0 0 2px rgba(129,140,248,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  font-size: 14px;
  background: var(--background);
  color: var(--foreground);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  user-select: none;
}
.sidebar-logo {
  padding: 14px 16px;
  font-size: 16px; font-weight: 700;
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo .dot { color: var(--primary); }
.sidebar-nav { flex:1; padding: 8px; display:flex; flex-direction:column; gap:2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-md);
  color: var(--sidebar-fg);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left;
  font-family: var(--font-sans);
}
.nav-item:hover { background: var(--sidebar-hover); color: #e6e6e6; }
.nav-item.active { background: rgba(91,127,255,0.15); color: var(--sidebar-active); }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.nav-item .badge-nav {
  margin-left: auto;
  background: var(--sidebar-active);
  color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: var(--radius-full);
}
.sidebar-footer {
  padding: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.theme-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  color: var(--sidebar-fg);
  cursor: pointer;
  font-size: 12px;
  border: none; background: none; width: 100%; text-align: left;
  font-family: var(--font-sans);
}
.theme-toggle:hover { background: var(--sidebar-hover); }

/* ── Main Layout ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header {
  height: var(--header-height);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  background: var(--card);
  flex-shrink: 0;
}
.header h1 { font-size: 15px; font-weight: 600; }
.header .sub { font-size: 12px; color: var(--muted-foreground); }
.content { flex:1; overflow-y:auto; padding: 20px; }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: var(--shadow-md); }
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.card-body { padding: 14px 16px; }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
}
.badge-ok { background: var(--success-light); color: var(--success); }
.badge-warn { background: var(--warning-light); color: var(--warning); }
.badge-err { background: var(--destructive-light); color: var(--destructive); }
.badge-info { background: var(--info-light); color: var(--info); }

/* ── Dot indicators ── */
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }
.dot.ok { background:var(--success); }
.dot.warn { background:var(--warning); }
.dot.err { background:var(--destructive); }
.dot.off { background:var(--muted-foreground); }

/* ── Kanban Board ── */
.kanban-board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  min-height: calc(100vh - var(--header-height) - 100px);
}
@media (max-width:1280px) { .kanban-board { grid-template-columns: repeat(3, 1fr); } }
@media (max-width:900px) { .kanban-board { grid-template-columns: 1fr; } }
.kanban-col {
  background: var(--muted);
  border-radius: var(--radius-lg);
  padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.kanban-col-header {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted-foreground);
  padding: 4px 6px;
  display: flex; align-items: center; gap: 6px;
}
.kanban-col-header .count {
  margin-left: auto;
  background: var(--card);
  padding: 1px 7px;
  border-radius: var(--radius-full);
  font-size: 11px;
}
.kanban-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.kanban-card:hover { border-color: var(--ring); box-shadow: var(--shadow-focus); }
.kanban-card .mod-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.kanban-card .mod-meta { font-size: 11px; color: var(--muted-foreground); display: flex; gap: 8px; }
.kanban-card .progress-bar {
  margin-top: 8px;
  height: 4px;
  background: var(--muted);
  border-radius: 2px;
  overflow: hidden;
}
.kanban-card .progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s;
}
.progress-fill.ok { background: var(--success); }
.progress-fill.warn { background: var(--warning); }
.progress-fill.info { background: var(--info); }
.kanban-card .phase-label { font-size: 10px; color: var(--muted-foreground); margin-top: 4px; }

/* ── Drag & Drop ── */
.kanban-card.dragging { opacity: 0.4; transform: scale(0.95); }
.kanban-card[draggable="true"] { cursor: grab; }
.kanban-card[draggable="true"]:active { cursor: grabbing; }
.kanban-col.drag-over { background: var(--accent); border: 2px dashed var(--ring); border-radius: var(--radius-lg); }
.kanban-col.drag-over .kanban-col-header { color: var(--primary); }

/* ── WS indicator ── */
.ws-indicator { display:inline-flex; align-items:center; gap:4px; font-size:10px; margin-left:8px; }
.ws-dot { width:6px; height:6px; border-radius:50%; }
.ws-dot.on { background:var(--success); }
.ws-dot.off { background:var(--destructive); }

/* ── View panels ── */
.view { display: none; }
.view.active { display: block; }

/* ── Execution log ── */
.log-line {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  color: var(--muted-foreground);
}
.log-line .ts { color: var(--muted-foreground); margin-right: 12px; }
.log-line.ok { color: var(--success); }
.log-line.err { color: var(--destructive); }
.log-line.warn { color: var(--warning); }

/* ── Settings ── */
.form-group { margin-bottom: 14px; }
.form-group label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:var(--muted-foreground); }
.form-group input, .form-group select {
  width: 100%; max-width: 400px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--card);
  color: var(--foreground);
  font-size: 13px;
  font-family: var(--font-sans);
}
.form-group input:focus { border-color: var(--ring); box-shadow: var(--shadow-focus); outline: none; }

/* ── Grid helpers ── */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px; }
@media (max-width:1000px) { .grid-2,.grid-3{grid-template-columns:1fr;} .grid-4{grid-template-columns:repeat(2,1fr);} }

/* ── KPI metric ── */
.metric { text-align:center; padding:12px 8px; }
.metric .value { font-size:28px; font-weight:700; }
.metric .label { font-size:11px; color:var(--muted-foreground); margin-top:2px; }

/* ── Loading / Error ── */
.loading { padding:20px; text-align:center; color:var(--muted-foreground); font-size:12px; }
.error-msg { padding:20px; text-align:center; color:var(--destructive); font-size:12px; }

/* ── Refresh bar ── */
.refresh-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.refresh-bar button {
  padding: 6px 16px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--foreground); font-size: 12px; cursor: pointer;
  font-family: var(--font-sans);
}
.refresh-bar button:hover { border-color: var(--ring); color: var(--primary); }

/* ── Animations ── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
.fade-in { animation: fadeIn 0.25s ease-out; }
.slide-up { animation: slideUp 0.25s ease-out; }
</style>
</head>
<body>

<!-- ═══════════════ Sidebar ═══════════════ -->
<aside class="sidebar">
  <div class="sidebar-logo">TLO<span class="dot">.</span> Platform</div>
  <nav class="sidebar-nav">
    <button class="nav-item active" data-view="kanban" onclick="switchView('kanban')">
      <span class="icon">📋</span> Kanban
    </button>
    <button class="nav-item" data-view="execution" onclick="switchView('execution')">
      <span class="icon">▶️</span> Execution
    </button>
    <button class="nav-item" data-view="reports" onclick="switchView('reports')">
      <span class="icon">📊</span> Reports
    </button>
    <button class="nav-item" data-view="knowledge" onclick="switchView('knowledge')">

    </button>
    <button class="nav-item" data-view="settings" onclick="switchView('settings')">
      <span class="icon">⚙️</span> Settings
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span> <span id="theme-label">Dark Mode</span>
    </button>
  </div>
</aside>

<!-- ═══════════════ Main Content ═══════════════ -->
<div class="main">
  <header class="header">
    <h1 id="view-title">📋 Kanban 看板</h1>
    <span class="sub" id="view-sub">测试生命周期管理器</span>
  </header>

  <div class="content">

    <!-- ── View: Kanban ── -->
    <div class="view active" id="view-kanban">
      <div class="refresh-bar">
        <div>
          <span style="font-size:12px;color:var(--muted-foreground);" id="kanban-ts"></span>
        </div>
        <button onclick="loadKanban()">🔄 刷新</button>
      </div>
      <div class="kanban-board" id="kanban-board">
        <div class="kanban-col"><div class="kanban-col-header">⏳ Pending</div><div class="loading">加载中...</div></div>
        <div class="kanban-col"><div class="kanban-col-header">📝 Planning</div><div class="loading">加载中...</div></div>
        <div class="kanban-col"><div class="kanban-col-header">▶️ Executing</div><div class="loading">加载中...</div></div>
        <div class="kanban-col"><div class="kanban-col-header">🔍 Analyzing</div><div class="loading">加载中...</div></div>
        <div class="kanban-col"><div class="kanban-col-header">✅ Completed</div><div class="loading">加载中...</div></div>
      </div>
    </div>

    <!-- ── View: Execution ── -->
    <div class="view" id="view-execution">
      <div class="refresh-bar">
        <div><span style="font-size:12px;color:var(--muted-foreground);">Agent 执行日志 — SSE 实时流</span></div>
        <button onclick="loadExecution()">🔄 刷新</button>
      </div>
      <div class="card">
        <div class="card-header">📡 执行日志</div>
        <div class="card-body" id="exec-log">
          <div style="padding:20px;text-align:center;color:var(--muted-foreground);">
            运行 <code>aitest sop run --module=&lt;m&gt;</code> 查看实时执行日志。
          </div>

      </div>

    <!-- ── View: Reports ── -->
    <div class="view" id="view-reports">
      <div class="refresh-bar">
        <div><span style="font-size:12px;color:var(--muted-foreground);">测试报告列表</span></div>
        <button onclick="loadReports()">🔄 刷新</button>
      </div>
      <div class="grid-2" id="reports-grid">
        <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
      </div>
    </div>

    <!-- ── View: Knowledge ── -->
    <div class="view" id="view-knowledge">
      <div class="refresh-bar">
        <div><span style="font-size:12px;color:var(--muted-foreground);">RAG 知识库 — ChromaDB 5 collections, 1,115 docs</span></div>
        <button onclick="loadKnowledge()">🔄 刷新</button>
      </div>
      <div class="grid-3" id="knowledge-grid">
        <div class="card"><div class="card-body"><div class="loading">加载中...</div></div></div>
      </div>

    <!-- ── View: Settings ── -->
    <div class="view" id="view-settings">
      <div class="card" style="max-width:600px;">
        <div class="card-header">⚙️ 平台配置</div>

          <div class="form-group">
            <label>LLM Provider</label>
            <select id="setting-provider">
              <option value="claude">Anthropic Claude</option>
              <option value="deepseek">DeepSeek</option>
              <option value="google">Google Gemini</option>

            <label>审计间隔 (秒, 默认 86400 = 24h)</label>
            <input type="number" id="setting-audit-interval" value="86400" placeholder="86400">
          </div>

            <label>API Base URL</label>
            <input type="text" id="setting-api-base" value="http://localhost:8000" placeholder="http://localhost:8000">
          </div>
          <button onclick="saveSettings()" style="padding:8px 20px;background:var(--primary);color:var(--primary-foreground);border:none;border-radius:var(--radius-md);font-size:13px;cursor:pointer;font-family:var(--font-sans);">保存配置</button>
        </div>
      </div>
    </div>

  </div>

<script>
/* ═══════════════ State ═══════════════ */
const API = '';
let currentView = 'kanban';
let moduleData = {};

/* ═══════════════ Theme ═══════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  if (isDark) { html.classList.remove('dark'); }
  else { html.classList.add('dark'); }
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? 'Dark Mode' : 'Light Mode';
  localStorage.setItem('tlo-theme', isDark ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem('tlo-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.documentElement.classList.add('dark');
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-label').textContent = 'Light Mode';
  }
})();

/* ═══════════════ WebSocket ═══════════════ */
let ws = null;
let wsConnected = false;

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws/kanban`;
  try {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      wsConnected = true;
      updateWSIndicator();
      console.log('[WS] Kanban connected');
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'card_moved') {
        // Remote card move → refresh Kanban
        loadKanban(true);
      } else if (msg.type === 'connected') {
        console.log(`[WS] ${msg.connections} client(s) connected`);
      }
    };
    ws.onclose = () => {
      wsConnected = false;
      updateWSIndicator();
      // Auto-reconnect after 3s
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => { wsConnected = false; updateWSIndicator(); };
  } catch(e) {
    wsConnected = false;
    updateWSIndicator();
  }
}

function updateWSIndicator() {
  const el = document.getElementById('ws-indicator');
  if (el) {
    el.innerHTML = wsConnected
      ? '<span class="ws-dot on"></span> Live'
      : '<span class="ws-dot off"></span> Off';
    el.title = wsConnected ? 'WebSocket connected' : 'WebSocket disconnected';
  }
}

function sendCardMove(mod, fromStage, toStage) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'card_move', module: mod, from_stage: fromStage, to_stage: toStage }));
  }
  // Also update via REST as fallback
  fetch(API + '/api/sop-status', { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ module: mod, stage: toStage }) }).catch(() => {});
}

/* ═══════════════ Drag & Drop ═══════════════ */
let dragMod = null, dragFromStage = null;

function handleDragStart(e, mod, stage) {
  dragMod = mod; dragFromStage = stage;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', mod);
}
function handleDragEnd(e) { e.target.classList.remove('dragging'); }

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function handleDrop(e, toStage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragMod && dragFromStage && dragFromStage !== toStage) {
    // Update local state
    const info = moduleData[dragMod];
    if (info) {
      const stageStatusMap = { pending:'pending', planning:'ready', executing:'in_progress', analyzing:'completed_with_issues', completed:'completed' };
      info.status = stageStatusMap[toStage] || info.status;
      info._kanban_stage = toStage;
    }
    // Broadcast to server + other clients
    sendCardMove(dragMod, dragFromStage, toStage);
    // Re-render
    loadKanban(true);
  }
  dragMod = null; dragFromStage = null;
}

/* ═══════════════ View Switching ═══════════════ */
const titles = {
  kanban: ['📋 Kanban 看板', '测试生命周期管理器'],
  execution: ['▶️ 执行监控', 'Agent 实时日志'],
  reports: ['📊 测试报告', 'Excel / Allure / HTML'],
  knowledge: ['🔍 知识库', 'ChromaDB RAG — 5 collections, 1,115 docs'],
  settings: ['⚙️ 设置', '平台配置']
};

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.getElementById('view-title').textContent = titles[view][0];
  document.getElementById('view-sub').textContent = titles[view][1];
  if (view === 'kanban') loadKanban();
  if (view === 'execution') loadExecution();
  if (view === 'reports') loadReports();
  if (view === 'knowledge') loadKnowledge();
}

/* ═══════════════ Kanban ═══════════════ */
async function loadKanban(silent = false) {
  const board = document.getElementById('kanban-board');
  const ts = document.getElementById('kanban-ts');
  if (!silent) {
    board.innerHTML = '<div class="kanban-col" style="grid-column:1/-1;"><div class="loading">加载中...</div></div>';
  }
  try {
    const res = await fetch(API + '/api/sop-status');
    const data = await res.json();
    moduleData = data.modules;

    const cols = { pending:[], planning:[], executing:[], analyzing:[], completed:[] };
    for (const [mod, info] of Object.entries(moduleData)) {
      const s = info._kanban_stage || info.status;
      if (s === 'completed') cols.completed.push([mod, info]);
      else if (s === 'completed_with_issues' || s === 'analyzing') cols.analyzing.push([mod, info]);
      else if (s === 'ready' || s === 'planning') cols.planning.push([mod, info]);
      else if (s === 'in_progress' || s === 'executing') cols.executing.push([mod, info]);
      else cols.pending.push([mod, info]);
    }

    const colDefs = [
      ['⏳ Pending', 'pending', cols.pending],
      ['📝 Planning', 'planning', cols.planning],
      ['▶️ Executing', 'executing', cols.executing],
      ['🔍 Analyzing', 'analyzing', cols.analyzing],
      ['✅ Completed', 'completed', cols.completed],
    ];

    board.innerHTML = colDefs.map(([title, key, items]) => {
      const cards = items.length ? items.map(([mod, info]) => `
        <div class="kanban-card slide-up" draggable="true"
             ondragstart="handleDragStart(event, '${mod}', '${key}')"
             ondragend="handleDragEnd(event)"
             onclick="openModuleDetail('${mod}')">
          <div class="mod-name">${mod}</div>
          <div class="mod-meta">
            <span>📄 ${info.pages || 0} pages</span>
            <span>🔧 ${info.phases || 0}/9 phases</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${key === 'completed' ? 'ok' : key === 'analyzing' ? 'warn' : 'info'}"
                 style="width:${(info.phases||0)/9*100}%"></div>
          </div>
          <div class="phase-label">${key === 'completed' ? '✅ 完成' : key === 'analyzing' ? '⚠️ 有问题' : key === 'planning' ? '📝 就绪' : key === 'executing' ? '▶️ 执行中' : '⏳ 待开始'}</div>
        </div>
      `).join('') : '<div style="padding:16px;text-align:center;color:var(--muted-foreground);font-size:12px;">— 空 —</div>';
      return `<div class="kanban-col"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
          ondrop="handleDrop(event, '${key}')">
        <div class="kanban-col-header">${title}<span class="count">${items.length}</span></div>
        ${cards}
      </div>`;
    }).join('');

    ts.innerHTML = new Date().toLocaleTimeString('zh-CN') +
      '<span class="ws-indicator" id="ws-indicator"><span class="ws-dot on"></span> Live</span>';
    updateWSIndicator();
  } catch(e) {
    board.innerHTML = '<div class="kanban-col" style="grid-column:1/-1;"><div class="error-msg">Kanban 数据不可用: ' + e.message + '</div></div>';
  }
}

function openModuleDetail(mod) {
  const info = moduleData[mod];
  if (!info) return;
  const statusBadge = info.status === 'completed' ? 'badge-ok' :
    info.status === 'completed_with_issues' ? 'badge-warn' : 'badge-info';
  alert(`模块: ${mod}\n状态: ${info.status}\n页面数: ${info.pages}\n阶段进度: ${info.phases}/9 phases\n更新: ${info.updated || 'N/A'}\n失败阶段: ${info.failed || 0}`);
}

/* ═══════════════ Execution ═══════════════ */
async function loadExecution() {
  const el = document.getElementById('exec-log');
  try {
    const res = await fetch(API + '/api/trace/runs?limit=5');
    const data = await res.json();
    if (data.runs && data.runs.length > 0) {
      el.innerHTML = data.runs.map(r => `
        <div class="log-line ok">
          <span class="ts">${r.timestamp || r.run_id || ''}</span>
          <span>Run: ${r.run_id || '?'} — ${r.event_count || 0} events</span>
        </div>
      `).join('');
    } else {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted-foreground);">无执行记录。运行 <code>aitest sop run --module=&lt;m&gt;</code> 产生数据。</div>';
    }
  } catch(e) {
    el.innerHTML = '<div class="error-msg">执行数据不可用</div>';
  }
}

/* ═══════════════ Reports ═══════════════ */
async function loadReports() {
  const el = document.getElementById('reports-grid');
  try {
    const res = await fetch(API + '/api/kpi/summary?days=30');
    const d = await res.json();
    el.innerHTML = `
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--info);">${d.state_drift?.audits || 0}</div>
        <div class="label">State Audits (30d)</div>
      </div></div>
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--warning);">${d.sop_compliance?.audits || 0}</div>
        <div class="label">SOP Audits (30d)</div>
      </div></div>
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--success);">${(d.sop_compliance?.avg_compliance * 100 || 0).toFixed(0)}%</div>
        <div class="label">SOP 合规率</div>
      </div></div>
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--primary);">$${d.cost?.avg_cost_per_period?.toFixed(2) || '0.00'}</div>
        <div class="label">30d 平均成本</div>
      </div></div>
    `;
  } catch(e) {
    el.innerHTML = '<div class="card"><div class="card-body"><div class="error-msg">报告数据不可用</div></div></div>';
  }
}

/* ═══════════════ Knowledge ═══════════════ */
async function loadKnowledge() {
  const el = document.getElementById('knowledge-grid');
  try {
    const res = await fetch(API + '/health');
    const d = await res.json();
    const rag = d.components?.rag || {};
    el.innerHTML = `
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--primary);">${rag.collections || 5}</div>
        <div class="label">Collections</div>
      </div></div>
      <div class="card"><div class="card-body metric fade-in">
        <div class="value">${rag.total_docs || 1115}</div>
        <div class="label">Documents</div>
      </div></div>
      <div class="card"><div class="card-body metric fade-in">
        <div class="value" style="color:var(--success);">${rag.status || 'connected'}</div>
        <div class="label">Status</div>
      </div></div>
    `;
  } catch(e) {
    el.innerHTML = '<div class="card"><div class="card-body"><div class="error-msg">知识库不可用</div></div></div>';
  }
}

/* ═══════════════ Settings ═══════════════ */
function saveSettings() {
  const provider = document.getElementById('setting-provider').value;
  const interval = document.getElementById('setting-audit-interval').value;
  localStorage.setItem('tlo-provider', provider);
  localStorage.setItem('tlo-audit-interval', interval);
  alert('配置已保存 (本地存储)');
}
(function loadSettings() {
  const provider = localStorage.getItem('tlo-provider');
  const interval = localStorage.getItem('tlo-audit-interval');
  if (provider) document.getElementById('setting-provider').value = provider;
  if (interval) document.getElementById('setting-audit-interval').value = interval;
})();

/* ═══════════════ Boot ═══════════════ */
connectWS();
loadKanban();
</script>
</body>
</html>
