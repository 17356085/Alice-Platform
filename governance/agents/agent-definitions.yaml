# Agent Definitions — 单一事实源
#
# 这是所有 Agent 的唯一定义来源。
# 其他文件从此文件派生:
#   - aitest/agent_runner.py  → AGENT_SKILL_MAP 从此文件加载
#   - .claude/skills/<name>/SKILL.md → 从此文件生成 Claude Code 适配层
#   - governance/agents/<name>.md → 从此文件生成人类可读文档
#
# 修改 Agent 行为时，只修改此文件。
# 运行 python -m aitest.check_agent_drift 检测派生文件是否过期。

version: "2.1"
last_updated: "2026-06-23"

# ═══════════════════════════════════════════════════════
# TLO (Testing Lifecycle Orchestrator) — Agent 体系
#  8 阶段生命周期: 需求分析 → 策略制定 → 用例设计 → 自动化开发
#                   → 环境准备 → 测试执行 → 失败分析 → 报告生成 → 回归推荐
# ═══════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════
# 横向贯穿 Skill（所有 Agent 可用，不绑定特定 Agent）
# ═══════════════════════════════════════════════════════
cross_cutting_skills:
  - id: productivity/caveman
    description: 超压缩通信模式（~75% token 节省），三级强度 lite/full/ultra
    trigger: 用户说 caveman/洞穴人/less tokens/be brief
    note: 长会话（>10轮）或 token 预算紧张时建议开启 full 模式

agents:
  # ═══════════════════════════════════════════════════════
  # ① Project Agent — Phase 0
  # ═══════════════════════════════════════════════════════
  project-agent:
    name: 项目 Agent
    category: project
    phase: "0"
    lifecycle_stage: "项目初始化"
    description: 项目初始化、上下文管理、文档审计、目录卫生
    system_prompt_role: 资深测试项目架构师
    trigger_keywords:
      - 初始化项目
      - 更新上下文
      - 上次做到哪了
      - 卫生检查
      - 目录清理
    skills:
      - project/project-context-manager
      - project/context-sync
      - project/hygiene-check
      - knowledge/completeness-check
    primary_skill_owner_of:
      - completeness-check
      - hygiene-check
    boundaries:
      - 不执行测试
      - 不生成自动化代码
      - 不分析 Bug
    context_files:
      - shared-language
      - project-profile
      - base-api-reference

  # ═══════════════════════════════════════════════════════
  # ② Requirement Agent — Phase 0.5~0.8
  # ═══════════════════════════════════════════════════════
  requirement-agent:
    name: Requirement Analyst (需求分析师)
    category: requirements
    phase: "1"
    lifecycle_stage: "需求分析"
    tlo_name: Requirement Analyst
    description: 理解业务需求、识别测试对象、生成测试目标。TLO 生命周期阶段 1。
    system_prompt_role: 资深需求分析师 + 测试架构师
    trigger_keywords:
      - 分析XX模块
      - 模块建模
      - 需求分析
    skills:
      - requirements/module-modeling
      - requirements/requirement-analysis
    boundaries:
      - 不涉及页面细节
      - 不生成自动化代码
      - 不设计测试用例
    context_files:
      - shared-language
      - project-profile

  # ═══════════════════════════════════════════════════════
  # ③ Test Design Agent — Phase 1~2.5
  # ═══════════════════════════════════════════════════════
  test-design-agent:
    name: Test Strategy Agent (测试策略师)
    category: test-design
    phase: "2"
    lifecycle_stage: "策略制定"
    tlo_name: Test Strategy Agent
    description: 测试策略生成——Smoke / Regression / Boundary / Negative / Security 五类策略。TLO 生命周期阶段 2。
    system_prompt_role: 资深测试分析师 + 质量风险专家 + 业务分析专家
    trigger_keywords:
      - 看看.*页面.*元素
      - 探索.*页面
      - 设计测试用例
      - 风险建模
      - 测试设计
      - 业务场景
    skills:
      - test-design/page-analysis       # P1-2: page-interface-generator 已合并为 page-analysis 的后处理
      - test-design/page-observe        # 🆕 BrowserUse 自动页面结构观察 (page-analysis 后处理)
      - test-design/pair-seed           # 🆕 结对种子注入——人类提供 2-5 核心场景，AI 围绕扩展
      - test-design/risk-modeling       # P2-5: 新增 BUSINESS_SCENARIOS.md 产出
      - test-design/testcase-design     # P2-5: 新增第 9 维度（业务场景验证）+ 结对种子合并
      - test-design/test-data-generation
      - test-design/api-testing
      - test-design/miniapp-testing
    output_artifacts:
      - PAGE_CONTEXT.md
      - PAGE_STRUCTURE.json             # 🆕 page-observe 自动生成
      - PAIR_SEEDS.md                   # 🆕 结对种子（人类填写，可选）
      - RISK_MODEL.md
      - BUSINESS_SCENARIOS.md           # P2-5: 业务场景模型（testcase-design 必选输入）
      - TEST_DESIGN.md                  # P2-5: 需覆盖 9 个维度（含业务场景验证）
      - TEST_CASES.md                   # P2-5: 需标注 BS-XXX-NNN 场景 ID 映射 + source 字段
      - PAGE_INTERFACE.yaml             # page-analysis 自动生成
    boundaries:
      - 不写代码
      - 不执行测试
      - 不分析 Bug
    context_files:
      - shared-language
      - project-profile
      - bu-adapter-api

  # ═══════════════════════════════════════════════════════
  # ④ Automation Agent — Phase 3~4
  # ═══════════════════════════════════════════════════════
  automation-agent:
    name: Automation Developer (自动化开发工程师)
    category: automation
    phase: "4"
    lifecycle_stage: "自动化开发"
    tlo_name: Automation Developer
    description: 技术分析 → 定位器设计 → PageObject/测试脚本生成 → Worktree 验证。TLO 生命周期阶段 4。
    system_prompt_role: 资深 Selenium + pytest 自动化开发专家
    trigger_keywords:
      - 这个按钮.*定位
      - 生成.*PageObject
      - 写.*自动化.*脚本
      - 修复.*自动化.*代码
    skills:
      - automation/tech-analysis
      - automation/auto-strategy
      - automation/page-object-generator
      - automation/test-script-generator      # P1-2: conftest-generator 已合并为 test-script-generator 的附带产出
      - automation/code-consistency-checker
    output_artifacts:
      - TECH_ANALYSIS.md
      - AUTO_STRATEGY.md
      - PageObject .py
      - test_*.py
      - conftest.py                            # test-script-generator 附带生成
    core_rules:
      - "先分析后编码：TECH_ANALYSIS → AUTO_STRATEGY → 代码生成"
      - "定位器值必须来自真实 HTML，不得编造"
      - "生成后必执行自检：grep 继承/绝对XPath/sleep/print"
    boundaries:
      - 不设计测试用例
      - 不分析页面元素清单
      - 不诊断失败根因
      - 不执行测试
    context_files:
      - shared-language
      - base-api-reference
      - coding-standards
      - element-plus-pitfalls
    modes:
      - generate:
          description: 完整生成 TECH_ANALYSIS + AUTO_STRATEGY + PageObject + test + conftest + 合规检查
          requires_page: true
      - fix:
          description: 增量修复定位器/等待/选择器/断言/代码错误，不修改测试逻辑
          requires_page: false

  # ═══════════════════════════════════════════════════════
  # ⑤ Execution Agent — Phase 4.5~7
  # ═══════════════════════════════════════════════════════
  execution-agent:
    name: Execution Agent (执行工程师)
    category: execution
    phase: "6"
    lifecycle_stage: "测试执行"
    tlo_name: Execution Agent
    description: 测试执行——Browser / API / Selenium / BrowserUse 多驱动。TLO 生命周期阶段 6。
    system_prompt_role: 资深测试执行工程师
    trigger_keywords:
      - 运行.*测试
      - 执行.*模块
      - 跑.*用例
    skills:
      - execution/allure-report-analyzer
    boundaries:
      - 不修改代码
      - 不分析失败原因
      - 不生成报告
    context_files:
      - shared-language
      - test-data-policy

  # ═══════════════════════════════════════════════════════
  # ⑥ Bug Analysis Agent — Phase 4.5~7
  # ═══════════════════════════════════════════════════════
  bug-analysis-agent:
    name: Failure Analyst (失败分析师)
    category: diagnosis
    phase: "7"
    lifecycle_stage: "失败分析"
    tlo_name: Failure Analyst
    description: 失败深度分析——截图→DOM→Console→Network→LLM→根因分类。TLO 核心差异化能力。TLO 生命周期阶段 7。
    system_prompt_role: 资深测试诊断专家 + CI 工程师
    trigger_keywords:
      - 这个用例.*挂
      - 失败.*分类
      - Jenkins.*失败
      - CI.*诊断
    skills:
      - diagnosis/bug-analysis
      - diagnosis/ci-pipeline-analysis
      - diagnosis/jenkinsfile-generator
    boundaries:
      - 不修改代码
      - 不执行测试
    context_files:
      - shared-language
      - element-plus-pitfalls
    modes:
      - single:
          description: 分析单个失败用例，L1.0 构建反馈循环后进入 L1 深度分析
      - batch:
          description: 批量分类多个失败用例，区分可自动修复 vs 非代码问题

  # ═══════════════════════════════════════════════════════
  # ⑦ Report Agent — Phase 8~9
  # ═══════════════════════════════════════════════════════
  report-agent:
    name: Report Agent (报告工程师)
    category: reporting
    phase: "8"
    lifecycle_stage: "报告生成"
    tlo_name: Report Agent
    description: 测试报告生成——Markdown / HTML / Allure / Excel (每页面)。TLO 生命周期阶段 8。
    system_prompt_role: 资深测试报告分析师
    trigger_keywords:
      - 生成.*报告
      - 导出.*Excel
      - 测试总结
      - 进度.*汇报
    skills:
      - reporting/report-generator
      - execution/excel-exporter
    primary_skill_owner_of:
      - excel-exporter
    boundaries:
      - 不执行测试
      - 不分析 Bug
    context_files:
      - shared-language
      - project-profile
    modes:
      - summary:
          description: 生成 TEST_SUMMARY.md
      - progress:
          description: 生成进度报告
      - excel:
          description: 导出综合 Excel（TEST_CASES + Allure 结果合并）

  # ═══════════════════════════════════════════════════════
  # 🆕 Test Designer Agent — Phase 3 (Spec Pipeline)
  # ═══════════════════════════════════════════════════════
  test-designer:
    name: Test Designer (测试设计器)
    category: test-design
    phase: "3"
    lifecycle_stage: "用例设计"
    tlo_name: Test Designer
    description: Spec Pipeline 四阶段测试用例设计——Gatherer→Researcher→Writer→Critic。借鉴 Aperant spec pipeline 模式，适配测试领域。
    system_prompt_role: 资深测试用例设计师 + 质量评审专家
    trigger_keywords:
      - 设计测试用例
      - 测试用例评审
      - Spec Pipeline
      - 生成测试方案
    skills:
      - test-design/spec-gatherer       # 🆕 收集需求+页面截图+API Schema+历史缺陷
      - test-design/spec-researcher     # 🆕 风险分析: 识别高风险区域+边界条件+安全漏洞面
      - test-design/spec-writer         # 🆕 产出测试用例: 步骤+预期+优先级+数据+标签
      - test-design/spec-critic         # 🆕 用例评审: 重复检测+覆盖率缺口+可执行性验证
    output_artifacts:
      - SPEC_GATHERER_REPORT.md
      - RISK_ANALYSIS.md
      - TEST_SPEC.md
      - CRITIC_REVIEW.md
    boundaries:
      - 使用 4 个 Skill 串行执行（非 4 个独立 Agent）
      - 不写代码
      - 不执行测试
    context_files:
      - shared-language
      - project-profile
      - test-data-policy

  # ═══════════════════════════════════════════════════════
  # 🆕 Environment Preparer Agent — Phase 5
  # ═══════════════════════════════════════════════════════
  environment-preparer:
    name: Environment Preparer (环境准备师)
    category: execution
    phase: "5"
    lifecycle_stage: "环境准备"
    tlo_name: Environment Preparer
    description: 测试环境就绪检查——数据准备、账号验证、浏览器状态、被测系统可达性。
    system_prompt_role: 资深测试环境工程师
    trigger_keywords:
      - 准备测试环境
      - 环境检查
      - 数据准备
    skills:
      - execution/data-preparer         # 🆕 测试数据生成/清理
      - execution/env-checker           # 🆕 账号+浏览器+系统可达性
    boundaries:
      - 不执行测试用例
      - 不修改业务代码
    context_files:
      - shared-language
      - test-data-policy
      - environments
    modes:
      - quick:
          description: 快速可达性检查
      - full:
          description: 完整环境准备（数据清理+重建+验证）

  # ═══════════════════════════════════════════════════════
  # 🆕 Regression Advisor Agent — Phase 9 (闭环反馈)
  # ═══════════════════════════════════════════════════════
  regression-advisor:
    name: Regression Advisor (回归顾问)
    category: knowledge
    phase: "9"
    lifecycle_stage: "回归推荐"
    tlo_name: Regression Advisor
    description: 基于代码变更 + 历史缺陷 + 执行结果 → 推荐回归测试范围。TLO 闭环反馈最后一环。
    system_prompt_role: 资深质量策略顾问
    trigger_keywords:
      - 回归测试范围
      - 哪些模块需要回归
      - 变更影响分析
    skills:
      - knowledge/regression-scope      # 🆕 代码变更→影响模块→推荐回归范围
      - knowledge/knowledge-manager     # 复用: 知识提取+沉淀
    boundaries:
      - 不执行测试
      - 不修改代码
    context_files:
      - shared-language
      - project-profile
    modes:
      - diff:
          description: 基于 Git diff 推荐回归范围
      - history:
          description: 基于历史缺陷推荐高风险区域

  # ═══════════════════════════════════════════════════════
  # ⑧ Knowledge Agent — 横向贯穿
  # ═══════════════════════════════════════════════════════
  knowledge-agent:
    name: 知识 Agent
    category: knowledge
    phase: "横向贯穿"
    description: 知识提取、沉淀、审计。唯一可跨 Agent 写入知识库的 Agent。
    system_prompt_role: 资深测试知识管理专家
    trigger_keywords:
      - 沉淀经验
      - Bug.*别人.*遇到
      - 知识.*提取
      - 知识.*审计
    skills:
      - knowledge/knowledge-manager
    secondary_skill_owner_of:
      - completeness-check
    boundaries:
      - 是唯一可跨 Agent 写入知识库的 Agent
      - 不执行测试
      - 不生成代码
    context_files:
      - shared-language
      - element-plus-pitfalls
    modes:
      - extract:
          description: 从 Bug/Agent 产出中提取知识模式
      - precipitate:
          description: 测试周期结束后的批量知识沉淀

  # ═══════════════════════════════════════════════════════
  # Full SOP — 编排器（非独立 Agent）
  # ═══════════════════════════════════════════════════════
  full-sop:
    name: TLO Lifecycle Orchestrator (测试生命周期编排器)
    category: orchestrator
    description: Testing Lifecycle Orchestrator — 8 阶段测试生命周期全流程编排。Phase 名称与 aitest/graphs/state.py CANONICAL_PHASES 一致。
    is_orchestrator: true
    phases:
      - stage: 1
        phase: 需求分析
        agent: requirement-agent
        tlo_name: Requirement Analyst
        description: 理解业务需求 → 识别测试对象 → 生成测试目标
      - stage: 2
        phase: 策略制定
        agent: test-design-agent
        tlo_name: Test Strategy Agent
        description: 生成 Smoke / Regression / Boundary / Negative / Security 测试策略
      - stage: 3
        phase: 用例设计
        agent: test-designer
        tlo_name: Test Designer
        per_page: true
        description: "Spec Pipeline: Gatherer → Researcher → Writer → Critic"
      - stage: 3-gate
        phase: 用例质量门禁
        agent: null
        gate: TESTCASE_QUALITY_GATE
        max_rounds: 2
        description: Critic score<60 打回 Test Designer 重做
      - stage: 4
        phase: 自动化开发
        agent: automation-agent
        tlo_name: Automation Developer
        per_page: true
        description: PageObject/测试脚本生成 → Worktree 隔离验证 → 合并
      - stage: 5
        phase: 环境准备
        agent: environment-preparer
        tlo_name: Environment Preparer
        description: 测试数据/账号/浏览器/被测系统可达性检查
      - stage: 6
        phase: 测试执行
        agent: execution-agent
        tlo_name: Execution Agent
        description: Browser / API / Selenium / BrowserUse 执行
        on_failure: failure-analyst → automation-developer(fix)
        max_rounds: 3
      - stage: 7
        phase: 失败分析
        agent: bug-analysis-agent
        tlo_name: Failure Analyst
        condition: execution_failed
        max_rounds: 3
        description: 截图→DOM→Console→Network→LLM 根因分析。QA Loop 入口。
      - stage: 7-loop
        phase: QA Loop
        agent: null
        description: Failure Analyst → Automation Developer (fix) → Execution Agent (re-run) → 通过/升级
        max_rounds: 3
      - stage: 8
        phase: 报告生成
        agent: report-agent
        tlo_name: Report Agent
        description: Markdown / HTML / Allure / Excel (每页面)
      - stage: 9
        phase: 回归推荐
        agent: regression-advisor
        tlo_name: Regression Advisor
        description: 代码变更 + 历史缺陷 → 推荐回归范围
    modes:
      - full
      - resume
      - status
      - from-requirement
      - from-strategy
      - from-design
      - from-automation
