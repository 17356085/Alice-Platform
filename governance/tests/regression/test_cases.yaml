# Regression Test Cases — P1-4: Golden Test 基线
# 修改 Skill Prompt 后，运行 `aitest regression run` 验证不退化。
#
# 评分策略:
#   - 主要依赖确定性 criteria（contains/not_contains/min_length）——稳定可靠
#   - baseline 相似度仅作辅助信号（阈值 0.2，LLM 输出天然非确定性）
#   - 不使用 structure（section headers 随模型而异）
#
# 支持的 expected 键:
#   min_length:   最少输出字符数
#   contains:     必须包含的关键词列表（不区分大小写）
#   not_contains: 禁止出现的关键词列表

version: "0.5"  # P1 2026-06-16: 15 → 35 cases (+20: 15 cross-module + 5 review)
test_cases:
  # ════════════════════════════════════════════════════════════════════
  #  test-design/ skills
  # ════════════════════════════════════════════════════════════════════
  - id: "page-analysis-basic"
    skill_id: "test-design/page-analysis"
    description: "页面分析——应输出元素清单和定位器建议"
    input: "分析 equipment/alarm-config 页面，提取所有可见元素和定位器"
    context:
      module: "equipment"
      page: "alarm-config"
    expected:
      min_length: 200
      contains: ["元素", "定位"]
      not_contains: ["time.sleep"]
    tags: ["smoke", "test-design"]

  - id: "risk-modeling-basic"
    skill_id: "test-design/risk-modeling"
    description: "风险建模——应输出六维度风险分析"
    input: "对 equipment/alarm-config 页面进行风险建模"
    context:
      module: "equipment"
      page: "alarm-config"
    expected:
      min_length: 200
      contains: ["风险", "P0"]
    tags: ["smoke", "test-design"]

  # ════════════════════════════════════════════════════════════════════
  #  automation/ skills
  # ════════════════════════════════════════════════════════════════════
  - id: "tech-analysis-basic"
    skill_id: "automation/tech-analysis"
    description: "技术分析——应识别 Element Plus 组件并设计定位器"
    input: "分析 equipment/alarm-config 页面HTML，识别Element Plus组件，设计稳定定位器"
    context:
      module: "equipment"
      page: "alarm-config"
    expected:
      min_length: 200
      contains: ["定位", "el-"]
      not_contains: ["time.sleep"]
    tags: ["smoke", "automation"]

  - id: "auto-strategy-basic"
