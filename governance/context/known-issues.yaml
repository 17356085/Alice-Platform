  - id: FP-004
    title: "非 Element Plus 自定义组件渲染时序晚于 document.readyState"
    category: failure-pattern
    component: stat-card, custom-components
    severity: medium
    reproduce_rate: 40
    symptoms:
      - "统计卡片数量不足(预期>=4,实际0-3)"
      - "get_text() 返回空字符串导致 isdigit() 断言失败"
      - "find_all 返回空列表"
    root_cause: "自定义组件(.stat-card等非el-前缀组件)的Vue渲染晚于document.readyState complete。_wait_page_ready()在DOM就绪后立即返回，但Vue的mount+data fetch+template render尚未完成自定义组件的渲染。"
    solution: |
      1. navigate方法末尾增加显式等待: WebDriverWait(driver,10).until(EC.presence_of_all_elements_located(STAT_CARD))
      2. tech-analysis阶段识别所有非el-前缀组件→强制标注显式等待策略
      3. get_stat_*()方法在取值前检查元素可见性
    affected_modules: [equipment, tank]
    affected_pages: [unit_management, key-param(同模式), camera(同模式), tank-monitor(同模式), tank-report(同模式)]
    first_seen: 2026-06-11
    last_seen: 2026-06-14
    occurrence_count: 3
    automated_detection: false
    status: active

  # ============================================================
  # 环境/数据问题
  # ============================================================

  - id: FP-005
    title: "多表格页面（如producion/daily-report）native click 被叠加层拦截，需 JS click"
    category: failure-pattern
    component: button-click
    severity: high
    reproduce_rate: 70
    symptoms:
      - "ElementClickInterceptedException on button click"
      - "BasePage.click() retry + JS fallback 仍偶现失败"
      - "按钮 visible 且 enabled，但被 el-card / el-overlay / welcome-card 遮挡"
    root_cause: "多卡片/多表格布局页面（如 production 日报表），上方的 welcome-card / stat-card 区域产生的遮罩可能覆盖下方操作按钮的 z-index。BasePage.click() 的 JS fallback 不够可靠时需直接用 driver.execute_script('arguments[0].click()')"
    solution: |
      1. 对弹窗触发类按钮，封装 `_js_click_by_text()` 方法：document.querySelectorAll 遍历 → 检查 offsetParent + is-disabled → b.click()
      2. 该方法已在 production/daily-report 页面验证稳定（录入/补录/趋势3按钮均通过）
    affected_modules: [production]
    affected_pages: [daily-report]
    first_seen: 2026-06-12
    last_seen: 2026-06-12
    occurrence_count: 1
    status: active

  - id: FP-006
    title: "Module-scoped driver 导致弹窗残留污染后续用例"
    category: failure-pattern
    component: test-isolation
    severity: medium
    reproduce_rate: 40
    symptoms:
      - "弹窗测试用例独立运行 PASS，全量串行时后序用例 FAIL"
      - "JS click 找到的按钮实际是前一个用例残留弹窗中的按钮"
      - "TimeoutException: 弹窗打开后找不到对应标题的 dialog"
    root_cause: "module 级 driver_setup fixture 共享浏览器，前一个用例的弹窗未完全关闭（Vue transition 动画期间 display:none 但 DOM 仍保留），导致 _js_click_by_text() 匹配到残留弹窗中的同名按钮"
    solution: |
      1. fixture teardown 中 JS 批量关闭所有 el-dialog + el-overlay + Escape 键兜底
      2. 每个用例末尾显式调用 page.click_dialog_cancel()
      3. 或改用 function 级 driver fixture（代价：每个用例独立登录，总耗时增加 ~50%）
    affected_modules: [production]
    first_seen: 2026-06-12
    last_seen: 2026-06-12
    occurrence_count: 1
    status: active

  - id: FP-007
    title: "同一页面中同名 class 元素分属不同 Vue 组件（span.section-title vs div.section-title）"
    category: failure-pattern
    component: locator-design
    severity: medium
    reproduce_rate: 100
    symptoms:
      - "XPath 使用 //span[contains(@class,'section-title')] 找不到 production 分区卡片"
      - "定位器在 dashboard 组件中匹配到元素，但在生产内容组件中匹配失败"
    root_cause: "同一页面由多个 Vue 组件组成，不同组件对同名 CSS class 使用了不同的 HTML 标签（dashboard 用 span，production 用 div），XPath 限定标签名会导致匹配失败"
    solution: "使用 //*[contains(@class,'section-title')] 通配所有标签，而非 //span 或 //div"
    affected_modules: [production]
    affected_pages: [daily-report]
    first_seen: 2026-06-12
    last_seen: 2026-06-12
    occurrence_count: 1
    status: active

  - id: FP-008
    title: "自定义 UI 框架模块 — 全局 CSS class 体系与 Element Plus 完全不兼容"
    category: failure-pattern
    component: custom-framework
    severity: high
    reproduce_rate: 100
    symptoms:
      - "BasePage 通用定位器 (DIALOG/TOAST/TABLE_ROWS) 匹配不到任何元素"
      - "el-table/el-button/el-dialog 等 EP class 选择器返回空"
      - "定位器在 Element Plus 页面有效，在自定义框架页面完全失效"
    root_cause: "模块使用自定义 UI 框架（class: btn btn-primary / data-table / stats-cards / filter-input），与 Element Plus 是完全不同的 CSS class 体系"
    solution: |
      1. 进入目标页面后 F12 检查按钮/表格/弹窗的 class 名 — 若 class 非 el-* 前缀 → 标记为自定义框架模块
      2. 所有定位器需从零编写，禁止复用 BasePage 通用定位器
      3. 表格: 定位 table.data-table（原生 HTML table）
      4. 按钮: 通过 XPath text() 匹配更稳定
      5. 输入框: input.filter-input（单层结构）
      6. 弹窗: 需确认实际 class（非 el-dialog），支持 EP + 自定义双定位器兜底
      7. 必须查阅 PROJECT_CONTEXT.md § 已确认的模块 UI 框架差异（UI-001~007）
    affected_modules: [tank]
    affected_pages: [tank-monitor, tank-report]
    first_seen: 2026-06-11
    last_seen: 2026-06-14
    occurrence_count: 2
    status: mitigated

