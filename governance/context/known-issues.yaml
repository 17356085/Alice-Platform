  - id: FP-009
    title: "fill_dialog_input 不支持 select/radio — 复杂对话框表单填充不完整"
    category: base-page
    component: BasePage.fill_dialog_input
    severity: medium
    reproduce_rate: 100
    symptoms:
      - "对话框点击保存后无 toast（静默校验失败）"
      - "部分表单字段填充失败，跳过"
      - "fill_dialog_input 对 el-select/el-radio 抛出异常"
    root_cause: "_get_dialog_form_item + find_in_parent 仅查找 input/textarea，不处理 select/radio/checkbox"
