issues:
  - id: EP-001
    title: "Teleport 渲染 — el-select/el-date-picker/el-dialog 选项挂载在 body 下"
    category: element-plus
    component: el-select, el-date-picker, el-dialog
    severity: high
    reproduce_rate: 95
    symptoms:
      - "ElementClickInterceptedException"
      - "NoSuchElementException（元素在 body 下而非组件内部）"
      - "is_displayed() 对 Teleport 元素返回 False"
    root_cause: "Element Plus 将下拉选项/日期面板/弹窗 Teleport 到 <body> 末尾"
    solution: |
      1. 使用 body 级定位器 `.el-popper`
      2. 避免依赖 `is_displayed()` 判断 Teleport 元素
      3. 优先使用 BasePage 已封装的组件操作方法（如 select_option）
    affected_modules: [equipment, system-user, system-role, personnel, sales, system-management]
    first_seen: 2026-01-15
    last_seen: 2026-06-10
    occurrence_count: 50
    status: active

  - id: EP-002
    title: "filterable el-select Teleport 渲染导致 Selenium 交互时序不一致"
    category: element-plus
    component: el-select (filterable)
    severity: high
    reproduce_rate: 80
    symptoms:
      - "点击下拉框后选项未出现"
      - "ElementNotInteractableException"
    root_cause: "Element Plus 2.x filterable select 选项通过 Teleport 渲染，交互时序不一致"
    solution: "优先 JS click: driver.execute_script('arguments[0].click()', element)"
    affected_modules: [equipment, system-user, personnel]
    first_seen: 2026-02-20
    last_seen: 2026-06-05
    occurrence_count: 20
    status: active

