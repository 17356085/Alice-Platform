# ── 审批链配置（系统预配，全部确认） ──────────────────
approval_chains:
  - name: 危废出库审批链
    code: wh_hazard_out
    steps: 2
    remark: 危废出库：主管审批 → 仓管审批
    step1:
      name: 主管审批
      approvers: [chenqian]  # 陈骞
      mode: 会签
    step2:
      name: 仓管审批
      approvers: [admin]  # 系统管理员
      mode: 会签

  - name: 备件入库审批链
    code: wh_in
    steps: 1
    remark: 入库申请：主管审批 → 仓管审批
    step1:
      name: 主管审批
      approvers: [admin]  # 系统管理员
      mode: 会签

  - name: 备件出库审批链
    code: wh_out
    steps: 1
    remark: 出库申请：主管审批 → 仓管审批
    step1:
      name: 主管审批
      approvers: [admin, chenqian]  # 系统管理员 + 陈骞
      mode: 会签

  - name: 备件盘点审批链
    code: wh_stocktake
    steps: 2
    remark: 盘点申请：主管审批 → 仓管审批
    step1:
      name: 主管审批
      approvers: [chenqian]  # 陈骞
      mode: 会签
    step2:
      name: 仓管审批
      approvers: [tjw]  # 田茜雯? (username=tjw, phone=15521061110)

  - name: 备件领用申请审批链
    code: wh_requisition
    steps: 2
    remark: 领用申请：主管审批 → 库管确认
    step1:
      name: 主管审批
      approvers: [admin, chenqian]  # 系统管理员 + 陈骞
      mode: 会签
    step2:
      name: 库管确认
      approvers: [tjw]
      mode: 会签

