    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "弹窗右上角关闭按钮"
    risk_level: low
    risk_reason: "标准关闭按钮"

  - name: "表格空状态提示"
    selector: "//div[contains(@class,'el-table__empty-text')]"
    selector_type: XPATH
    element_type: other
    el_component: ""
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "可能显示'暂无申请记录'等变体"
    risk_level: medium
    risk_reason: "文案可能变化"

test_scenarios:
  - id: TC-001
    title: "按审批状态筛选"
    priority: P0
    type: positive
    preconditions: ["页面上存在申请记录"]
