    selector: "//div[contains(@class,'el-form-item')][.//label[text()='审批状态']]//div[contains(@class,'el-select')]"
    selector_type: XPATH
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "通过label文本定位对应的el-select"
    risk_level: low
    risk_reason: "标准el-select下拉"

  - name: "报表日期范围选择器"
    selector: "//div[contains(@class,'el-form-item')][.//label[text()='报表日期']]//div[contains(@class,'el-date-range-picker')]"
    selector_type: XPATH
    element_type: datepicker
    el_component: el-date-picker
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "两个日期输入框组合"
    risk_level: low
    risk_reason: "标准日期范围选择器"

  - name: "工厂代码下拉"
    selector: "//div[contains(@class,'el-form-item')][.//label[text()='工厂']]//div[contains(@class,'el-select')]//input"
    selector_type: XPATH
    element_type: select
    el_component: el-select
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "非标准标题字段，通过JS遍历label定位输入框"
    risk_level: high
    risk_reason: "依赖文本遍历，可能存在多语言或变体"

  - name: "搜索按钮"
    selector: "//button[span[text()='搜索']]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: WebDriverWait
    locator_notes: "使用JS点击绕过拦截，查找文本'搜索'的按钮"
    risk_level: medium
    risk_reason: "按钮可能有防重复点击拦截"

  - name: "重置按钮"
    selector: "//button[span[text()='重置']]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: WebDriverWait
    locator_notes: "使用JS点击绕过拦截，查找文本'重置'的按钮"
    risk_level: medium
    risk_reason: "按钮可能有防重复点击拦截"

  - name: "表格主体"
    selector: "//div[contains(@class,'el-table')]"
    selector_type: XPATH
    element_type: table
    el_component: el-table
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: ""
    risk_level: low
    risk_reason: "标准el-table"

  - name: "第一行查看详情按钮"
    selector: "(//div[contains(@class,'el-table__row')][1]//button[.//span[text()='查看详情']])[1]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "点击表格第一行的查看详情按钮"
    risk_level: low
    risk_reason: "存在性依赖数据"

  - name: "第一行撤回按钮"
    selector: "(//div[contains(@class,'el-table__row')][1]//button[.//span[text()='撤回']])[1]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "仅审批中状态显示，无数据时跳过"
    risk_level: high
    risk_reason: "按钮动态显示，状态依赖，可能不存在"

  - name: "详情弹窗"
    selector: "//div[contains(@class,'el-dialog') and .//span[contains(text(),'详情')]]"
    selector_type: XPATH
    element_type: dialog
    el_component: el-dialog
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "查看详情后弹出的弹窗"
    risk_level: low
    risk_reason: "标准el-dialog"

  - name: "详情弹窗关闭按钮"
    selector: "//div[contains(@class,'el-dialog') and .//span[contains(text(),'详情')]]//button[contains(@class,'el-dialog__headerbtn')]"
