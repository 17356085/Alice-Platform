test_scenarios:
  - id: TC-PST-001
    title: 页面正常加载
    priority: P0
    type: smoke
    preconditions: ["用户已登录且有权限"]
    steps_summary: "访问岗位管理页面"
    expected: "表格区域显示岗位列表，搜索区、分页器均正常渲染"
    relates_to_elements: ["岗位表格", "搜索按钮", "重置按钮", "分页器"]

  - id: TC-PST-002
    title: 删除关联岗位
    priority: P0
    type: negative
    preconditions: ["存在一个岗位已被员工关联"]
    steps_summary: "点击该岗位的删除按钮，确认删除"
    expected: "后端返回错误提示，删除失败，页面显示Toast错误信息"
    relates_to_elements: ["行内删除按钮", "删除确认弹窗确认按钮"]

  - id: TC-PST-003
    title: 敏感字段权限
    priority: P0
    type: boundary
    preconditions: ["以无权限角色（如非admin）登录"]
    steps_summary: "查看岗位编辑弹窗"
    expected: "薪资等敏感字段不可见或禁用"
    relates_to_elements: ["新增/编辑表单-编制人数"]

  - id: TC-PST-004
    title: 编码搜索
    priority: P1
    type: positive
    preconditions: ["存在多个岗位"]
    steps_summary: "在搜索框输入岗位编码关键字，点击搜索"
    expected: "表格仅显示编码匹配的岗位"
    relates_to_elements: ["岗位编码搜索框", "搜索按钮"]

  - id: TC-PST-005
    title: 部门筛选
    priority: P1
    type: positive
    preconditions: ["存在多个部门的岗位"]
    steps_summary: "选择部门，点击搜索"
    expected: "表格仅显示该部门的岗位"
    relates_to_elements: ["部门筛选下拉", "搜索按钮"]

  - id: TC-PST-006
    title: 分类筛选（根据上下文可能是状态筛选）
    priority: P1
    type: positive
    preconditions: ["存在不同状态的岗位"]
    steps_summary: "选择状态分类（如启用/禁用），点击搜索"
    expected: "表格仅显示对应状态的岗位"
    relates_to_elements: ["搜索按钮"]

  - id: TC-PST-007
    title: 状态筛选（与006类似，但明确）
    priority: P1
    type: positive
    preconditions: ["存在不同状态的岗位"]
    steps_summary: "选择状态（启用/禁用），点击搜索"
    expected: "表格根据状态过滤"
    relates_to_elements: ["搜索按钮"]

  - id: TC-PST-008
    title: 重置+分页
    priority: P1
    type: positive
    preconditions: ["已执行搜索条件并进入非第一页"]
    steps_summary: "点击重置按钮，然后翻页"
    expected: "表格恢复全量数据，分页器显示总条数，可正常翻页"
    relates_to_elements: ["重置按钮", "分页器"]

  - id: TC-PST-009
    title: 新增岗位
    priority: P1
    type: positive
    preconditions: ["用户有新增权限"]
    steps_summary: "点击新增按钮，填写表单（名称、编码、部门、编制人数、描述），提交"
    expected: "Toast提示新增成功，表格刷新显示新岗位"
    relates_to_elements: ["新增岗位按钮", "新增/编辑表单-岗位名称", "新增/编辑表单-岗位编码", "新增/编辑表单-部门选择", "新增/编辑表单-编制人数", "弹窗提交按钮"]

  - id: TC-PST-010
    title: 编辑岗位
    priority: P1
    type: positive
    preconditions: ["存在一个岗位"]
    steps_summary: "点击编辑按钮，修改岗位名称或部门，保存"
    expected: "Toast提示编辑成功，表格刷新显示更新后的数据"
    relates_to_elements: ["行内编辑按钮", "新增/编辑表单-岗位名称", "弹窗提交按钮"]

page_behaviors:
  - behavior: 表格异步加载
    triggers: ["页面加载", "搜索后", "新增/编辑/删除后"]
    wait_required: true
    wait_suggestion: "wait_loading_gone 或 wait_vue_stable"

  - behavior: 部门下拉异步加载
    triggers: ["打开弹窗", "点击部门筛选下拉"]
    wait_required: true
    wait_suggestion: "wait_vue_stable + 等待选项渲染"

  - behavior: 行内编辑切换为编辑模式
    triggers: ["点击行内编辑按钮"]
    wait_required: true
    wait_suggestion: "wait_vue_stable（等待表单激活）"

  - behavior: 删除确认弹窗
    triggers: ["点击行内删除按钮"]
    wait_required: true
    wait_suggestion: "等待弹窗出现"

  - behavior: 分页切换
    triggers: ["点击分页器页码或前进后退"]
    wait_required: true
    wait_suggestion: "wait_loading_gone"

  - behavior: 表格刷新
    triggers: ["搜索、重置、新增、编辑、删除成功后"]
    wait_required: true
    wait_suggestion: "wait_vue_stable 或 wait_loading_gone"