test_scenarios:
  - id: TC-001
    title: "根据审批状态搜索已通过记录"
    priority: P0
    type: positive
    preconditions: ["存在已审批通过的记录"]
    steps_summary: "选择审批状态为'已通过'，点击搜索按钮，等待表格刷新"
    expected: "表格仅显示审批状态为'已通过'的记录"
    relates_to_elements: ["审批状态下拉框", "搜索按钮"]

  - id: TC-002
    title: "根据报表日期范围搜索"
    priority: P0
    type: positive
    preconditions: ["存在指定日期范围内的记录"]
    steps_summary: "设置报表日期起始和结束，点击搜索按钮"
    expected: "表格显示该日期范围内的记录"
    relates_to_elements: ["报表日期范围选择器", "搜索按钮"]

  - id: TC-003
    title: "根据工厂代码搜索(支持模糊匹配)"
    priority: P0
    type: positive
    preconditions: ["存在对应工厂记录"]
    steps_summary: "输入工厂代码文本，点击搜索按钮"
    expected: "表格显示匹配工厂代码的记录"
    relates_to_elements: ["工厂代码输入框", "搜索按钮"]

  - id: TC-004
    title: "重置搜索条件"
    priority: P1
    type: positive
    preconditions: ["已输入搜索条件"]
    steps_summary: "设置任意搜索条件后点击重置按钮"
    expected: "所有搜索条件清空，表格恢复默认加载全部记录"
    relates_to_elements: ["审批状态下拉框", "报表日期范围选择器", "工厂代码输入框", "重置按钮"]

  - id: TC-005
    title: "查看第一条审批记录详情"
    priority: P0
    type: positive
    preconditions: ["表格至少有一条记录"]
    steps_summary: "点击第一行的'查看详情'按钮，等待弹窗出现"
    expected: "弹窗正确显示该记录的审批详情（包含申请信息、审批意见等）"
    relates_to_elements: ["第一行查看详情按钮", "详情弹窗"]

  - id: TC-006
    title: "关闭详情弹窗"
    priority: P1
    type: positive
    preconditions: ["详情弹窗已打开"]
    steps_summary: "点击弹窗右上角关闭按钮，或弹窗外空白区域"
    expected: "弹窗关闭，页面恢复到表格视图"
    relates_to_elements: ["详情弹窗关闭按钮"]

  - id: TC-007
    title: "空状态显示（无已审批项）"
    priority: P1
    type: negative
    preconditions: ["当前用户无任何审批历史"]
    steps_summary: "直接进入页面，不进行任何搜索"
    expected: "表格显示空状态提示，文案包含'暂无已审批项'或'暂无'"
    relates_to_elements: ["审批历史表格"]

  - id: TC-008
    title: "仅按工厂代码搜索（组合条件之一）"
    priority: P2
    type: positive
    preconditions: ["存在对应工厂记录"]
    steps_summary: "输入工厂代码，不设置其他条件，点击搜索"
    expected: "表格过滤出该工厂的所有审批记录（不限制状态和日期）"
    relates_to_elements: ["工厂代码输入框", "搜索按钮"]

