elements:
  - name: "审批状态下拉框"
    selector: ".el-form-item .el-select:has(.el-form-item__label:contains('审批状态'))"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "通过包含标签文本'审批状态'的form-item定位select，选项值为'已通过'/'已驳回'"
    risk_level: low
    risk_reason: ""

  - name: "报表日期范围选择器"
    selector: ".el-form-item .el-date-range-picker:has(.el-form-item__label:contains('报表日期'))"
    selector_type: CSS_SELECTOR
    element_type: datepicker
    el_component: el-date-range-picker
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "日期范围选择器，使用BasePage通用方法"
    risk_level: low
    risk_reason: ""

  - name: "工厂代码输入框"
    selector: ".el-form-item__label:contains('工厂') ~ .el-form-item__content .el-input__inner"
    selector_type: CSS_SELECTOR
    element_type: input
    el_component: el-select
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "注意：标签文本是'工厂'而非'标题'，输入框位于el-select内，定位用JS遍历标签"
    risk_level: medium
    risk_reason: "工厂代码并非标准标题字段，定位方式依赖JS，可能因DOM结构变化而失效"

  - name: "搜索按钮"
    selector: "button:contains('搜索')"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "使用JS点击绕过拦截，调用 _js_click_search_or_reset('搜索')"
    risk_level: low
    risk_reason: "按钮可能被el-select的拦截机制阻挡，需用JS点击"

  - name: "重置按钮"
    selector: "button:contains('重置')"
    selector_type: CSS_SELECTOR
