interface: page-to-automation
version: "1.0"
source_agent: test-design-agent
target_agent: automation-agent
generated_at: "2026-06-22 10:00"

meta:
  module: "dcs"
  page_name: "CommonDataPage"
  page_slug: "common-data"
  page_url: "/dcs/common-data"
  page_type: "卡片面板页（拖拽排序）"
  vue_components:
    - component: el-input
      count: 1
      risk_flags: []
    - component: el-button
      count: 6
      risk_flags: []
    - component: el-select
      count: 1
      risk_flags: []
    - component: el-card
      count: 2
      risk_flags: ["数量不固定", "拖拽可能触发重排"]
    - component: el-table
      count: 1
