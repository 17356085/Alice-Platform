  - behavior: "弹窗打开/关闭"
    triggers: ["点击新增/编辑", "点击保存/取消"]
    wait_required: true
    wait_suggestion: "wait_dialog_open / wait_dialog_close"

  - behavior: "告警规则联动"
    triggers: ["选择告警规则类型"]
    wait_required: true
    wait_suggestion: "wait_vue_stable（上下限输入框显示/隐藏）"

  - behavior: "分页切换"
    triggers: ["点击下一页/上一页"]
    wait_required: true
    wait_suggestion: "_wait_loading_gone"
