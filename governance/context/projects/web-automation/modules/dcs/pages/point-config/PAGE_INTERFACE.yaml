      - "弹窗名称输入"
      - "弹窗类型下拉"
      - "弹窗设备下拉"
      - "采集周期输入"
      - "告警规则下拉"

  - id: TC-DCS-CFG-007
    title: "告警规则配置"
    priority: P1
    type: positive
    preconditions: ["打开新增/编辑弹窗"]
    steps_summary: "选择告警规则 → 填写上下限"
    expected: "告警上下限输入框显示/隐藏，保存成功"
    relates_to_elements:
      - "告警规则下拉"
      - "告警上限输入"
      - "告警下限输入"

  - id: TC-DCS-CFG-008
