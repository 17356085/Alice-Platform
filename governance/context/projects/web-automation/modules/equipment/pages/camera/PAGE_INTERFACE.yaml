    steps_summary: "搜索框输入关键词 → 点击搜索"
    expected: "网格更新，仅显示匹配结果"
    relates_to_elements:
      - "搜索输入框"
      - "搜索按钮"

  - id: TC-CM-005
    title: 在线状态筛选
    priority: P1
    type: positive
