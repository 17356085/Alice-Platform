test_scenarios:
  - id: TC-CM-001
    title: 页面正常加载
    priority: P0
    type: smoke
    preconditions:
      - "admin 账号已登录"
    steps_summary: "navigate_to('设备管理','摄像头管理') → 等待 monitor-cell 出现"
    expected: "统计卡片 + 摄像头网格 + 分页均可见，无 console 报错"
    relates_to_elements:
      - "统计卡片-总数"
      - "摄像头网格容器"

  - id: TC-CM-002
    title: 统计卡片数据校验
    priority: P0
    type: positive
    preconditions:
      - "页面已加载"
    steps_summary: "读取 4 张统计卡片数值 → 校验 总数=在线+离线+故障"
    expected: "四卡片数值非空且逻辑一致"
    relates_to_elements:
      - "统计卡片-总数"
      - "统计卡片-在线"
      - "统计卡片-离线"
      - "统计卡片-故障"

  - id: TC-CM-003
    title: 摄像头网格展示
    priority: P0
    type: positive
    preconditions:
      - "页面已加载"
    steps_summary: "计数 monitor-cell → 校验 ≥1 个，每格含标题/画面/IP"
    expected: "≥1 个摄像头卡片，每个包含基本信息"
    relates_to_elements:
      - "摄像头网格容器"

  - id: TC-CM-004
    title: 关键词搜索
    priority: P1
    type: positive
