test_scenarios:
  - id: TC-PROD-DR-001
    title: "页面基本元素加载"
    priority: P0
    type: positive
    preconditions: ["admin登录"]
    steps_summary: "导航到页面，等待加载后检查搜索区、按钮、4个分区卡片可见"
    expected: "日期选择器、查询/录入/补录/趋势/导出/打印按钮、4个分区卡片均可见"
    relates_to_elements: ["date-picker", "btn-search", "btn-enter-data", "btn-supplement", "btn-adjust", "btn-trend", "btn-export", "btn-print", "table-product", "table-material", "table-utilities", "table-refrigerant"]
  - id: TC-PROD-DR-002
    title: "四个分区表头验证"
    priority: P0
    type: positive
    preconditions: ["admin登录", "有数据日期已查询"]
    steps_summary: "选择有数据日期并查询，验证每个分区表格表头列名正确"
    expected: "产品8列、原料8列、公辅工程8列、冷剂消耗6列，列名正确"
    relates_to_elements: ["table-product", "table-material", "table-utilities", "table-refrigerant"]
  - id: TC-PROD-DR-003
    title: "查询当天数据"
    priority: P0
    type: positive
    preconditions: ["admin登录"]
    steps_summary: "选择当天日期，点击查询，等待loading消失"
    expected: "四区表格数据刷新，loading过程正常，无报错"
    relates_to_elements: ["date-picker", "btn-search"]
  - id: TC-PROD-DR-004
    title: "打开录入数据弹窗"
    priority: P0
    type: positive
    preconditions: ["admin登录"]
    steps_summary: "点击'录入数据'按钮，等待弹窗出现"
    expected: "弹窗标题'录入数据'，装置下拉可见，确定/取消按钮可见"
    relates_to_elements: ["btn-enter-data", "dialog-enter", "enter-device-select", "enter-btn-confirm", "enter-btn-cancel"]
  - id: TC-PROD-DR-005
    title: "录入数据成功"
    priority: P0
    type: positive
    preconditions: ["admin登录", "弹窗已打开"]
    steps_summary: "选择装置（如1#装置），点击确定，等待toast"
    expected: "toast显示'录入成功'，弹窗关闭"
    relates_to_elements: ["enter-device-select", "enter-btn-confirm"]
  - id: TC-PROD-DR-006
    title: "调整按钮默认disabled"
    priority: P1
    type: negative
    preconditions: ["admin登录"]
    steps_summary: "导航到页面，检查调整按钮状态"
    expected: "按钮含有is-disabled class，不可点击"
    relates_to_elements: ["btn-adjust"]
  - id: TC-PROD-DR-007
    title: "四区数据行非空"
    priority: P1
    type: positive
    preconditions: ["有数据日期已查询"]
    steps_summary: "查询后有数据日期，逐区获取表格行数"
    expected: "每区至少1行数据"
    relates_to_elements: ["table-product", "table-material", "table-utilities", "table-refrigerant"]
