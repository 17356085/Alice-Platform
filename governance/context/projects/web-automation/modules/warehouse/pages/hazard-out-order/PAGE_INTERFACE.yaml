    selector_type: XPATH
    element_type: input
    el_component: el-input
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "经办人搜索输入框"
    risk_level: low

  - name: "btnQuery"
    selector: "//button[contains(.,'查询')]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
