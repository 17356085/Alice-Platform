  - name: "btnReset"
    selector: "//button[contains(.,'重置')]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "btnAdd"
    selector: "//button[contains(.,'新增出库')]"
    selector_type: XPATH
    element_type: button
