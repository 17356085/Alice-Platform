page: spare-stocktake
route: 库管管理 > 备品备件管理 > 库存盘点
elements:
  search:
    - name: 盘点人
      label: 盘点人
      type: el-input
      locator: "//input[@placeholder=\"请输入盘点人\"]"
    - name: 日期
      label: 选择日期
      type: el-date-picker
      locator: "//input[@placeholder=\"选择日期\"]"
  buttons:
    - name: 查询
      locator: "//button[contains(.,\"查询\")]"
    - name: 重置
      locator: "//button[contains(.,\"重置\")]"
  table:
    - column: 盘点人
      type: text
    - column: 盘点日期
      type: date
  dialogs: []
