interface: page-to-automation
version: "1.0"
source_agent: test-design-agent
target_agent: automation-agent
generated_at: "2026-06-13 15:10"

meta:
  module: "warehouse"
  page_name: "SpareStockPage"
  page_slug: "spare-stock"
  page_url: "/warehouse/spare/stock"
  vue_components:
    - component: wh-filter-toolbar
      count: 1
      risk_flags: ["自定义UI框架"]
    - component: el-input
      count: 1
      risk_flags: ["物品名称输入框"]
    - component: el-table
      count: 1
      risk_flags: ["8列只读表格(库存数量/安全库存)"]
    - component: el-pagination
      count: 1
      risk_flags: []

elements:
  - name: "filterItemName"
    selector: "//input[@placeholder='请输入物品名称']"
    selector_type: XPATH
    element_type: input
    el_component: el-input
    interaction: input
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "btnQuery"
    selector: "//button[contains(.,'查询')]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "btnReset"
    selector: "//button[contains(.,'重置')]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "stockTable"
    selector: ".el-table__body-wrapper"
    selector_type: CSS_SELECTOR
    element_type: table
    el_component: el-table
    interaction: wait
    wait_strategy: WebDriverWait
    locator_notes: "8列只读表格(序号/物品编号/物品名称/规格型号/单位/库存数量/安全库存/备注)"
    risk_level: medium

  - name: "pagination"
    selector: ".el-pagination"
    selector_type: CSS_SELECTOR
    element_type: pagination
    el_component: el-pagination
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: low

test_scenarios:
  - id: TC-SS-001
    title: "页面正常加载(只读)"
    priority: P0
    type: smoke
    steps_summary: "导航到 #/warehouse/spare/stock"
    expected: "8列表格+搜索区，无新增/编辑/删除按钮"
    relates_to_elements: ["stockTable", "pagination"]

  - id: TC-SS-002
    title: "按物品名称搜索"
    priority: P0
    type: functional
    steps_summary: "输入物品名称→查询"
    expected: "表格过滤"
    relates_to_elements: ["filterItemName", "btnQuery"]

  - id: TC-SS-003
    title: "重置搜索"
    priority: P0
    type: functional
    steps_summary: "设置条件→重置"
    expected: "恢复全量"
    relates_to_elements: ["btnReset"]
