elements:
  - name: "filterStatus"
    selector: "(//div[contains(@class,'wh-filter-toolbar')]//div[contains(@class,'el-select__wrapper')])[1]"
    selector_type: XPATH
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "filterApplicant"
    selector: "//input[@placeholder='请输入申请人']"
    selector_type: XPATH
    element_type: input
    el_component: el-input
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "★ 搜索字段是'申请人'非'经办人'"
    risk_level: low

  - name: "filterDate"
    selector: "//input[@placeholder='选择日期']"
    selector_type: XPATH
    element_type: datepicker
    el_component: el-date-picker
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: medium

  - name: "btnQuery"
    selector: "//button[contains(.,'查询')]"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    risk_level: low

  - name: "btnReset"
    selector: "//button[contains(.,'重置')]"
    selector_type: XPATH
