    wait_suggestion: "wait_loading_gone（自定义表格加载指示器）"

  - behavior: "新增弹窗表单校验"
    triggers: ["点击保存但表单未通过校验"]
    wait_required: false
    wait_suggestion: "无需等待"

  - behavior: "新增成功后表格数据更新"
    triggers: ["保存成功"]
    wait_required: true
    wait_suggestion: "wait_loading_gone（表格重新加载）"

  - behavior: "日期搜索后表格刷新"
