test_scenarios:
  - id: TC-LW-001
    title: "页面正常加载"
    priority: P0
    type: smoke
    preconditions: ["登录admin"]
    steps_summary: "导航到水质分析报告单页面，等待渲染完成"
    expected: "取样位置Tab栏可见、开始/结束日期可见、新增/导出按钮可见"
    relates_to_elements: ["开始日期", "结束日期", "新增按钮", "导出按钮", "取样位置Tab栏"]

  - id: TC-LW-002
    title: "切换取样位置"
    priority: P1
    type: positive
    preconditions: ["TC-LW-001通过"]
    steps_summary: "点击第二个取样位置Tab，等待表格刷新"
    expected: "Tab高亮切换，表格数据更新"
    relates_to_elements: ["取样位置Tab栏", "报告表格"]

  - id: TC-LW-010
    title: "新增报告单-合法数据"
    priority: P0
    type: positive
    preconditions: ["TC-LW-001通过"]
    steps_summary: "点击新增，填写检验员、复核员、水质指标(pH,COD,氨氮)，保存"
    expected: "弹窗关闭、toast'保存成功'、表格新增一条记录"
    relates_to_elements: ["新增按钮", "新增弹窗-检验员", "新增弹窗-复核员", "新增弹窗-水质指标", "新增弹窗-保存按钮", "报告表格"]

  - id: TC-LW-011
    title: "新增-必填校验"
    priority: P1
    type: negative
    preconditions: []
    steps_summary: "点击新增，不填检验员和复核员，直接保存"
    expected: "检验员/复核员显示必填校验提示"
    relates_to_elements: ["新增弹窗-检验员", "新增弹窗-复核员", "新增弹窗-保存按钮"]

  - id: TC-LW-012
    title: "新增-指标边界值"
    priority: P2
    type: boundary
    preconditions: []
    steps_summary: "点击新增，pH填-1，保存"
    expected: "校验提示'pH值范围为0-14'"
    relates_to_elements: ["新增弹窗-水质指标", "新增弹窗-保存按钮"]

  - id: TC-LW-020
    title: "日期范围搜索"
    priority: P1
    type: positive
    preconditions: []
    steps_summary: "设置开始日期2026-06-01，结束日期2026-06-12，点击查询"
    expected: "表格仅显示该日期范围内的报告单"
    relates_to_elements: ["开始日期", "结束日期", "查询按钮", "报告表格"]

page_behaviors:
