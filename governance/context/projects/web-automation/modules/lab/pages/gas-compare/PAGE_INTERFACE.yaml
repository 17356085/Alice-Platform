interface: page-to-automation
version: "1.0"
source_agent: test-design-agent
target_agent: automation-agent
generated_at: "2026-06-13 12:00"

meta:
  module: "lab"
  page_name: "GasCompare"
  page_slug: "gas-compare"
  page_url: "/lab/gas-compare"
  vue_components:
    - component: el-table
      count: 1
      risk_flags: []
    - component: el-date-picker
      count: 2
      risk_flags: []
    - component: el-select
      count: 2
      risk_flags: []
    - component: el-button
      count: 2
      risk_flags: []

elements:
  - name: "开始日期"
    selector: "input[placeholder='开始日期']"
    selector_type: CSS_SELECTOR
    element_type: datepicker
    el_component: el-date-picker
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "如果placeholder不存在，可改用XPath //span[text()='开始日期']/following::div//input"
    risk_level: low
    risk_reason: "日期选择器UI稳定，但placeholder可能被国际化覆盖"

  - name: "结束日期"
    selector: "input[placeholder='结束日期']"
    selector_type: CSS_SELECTOR
    element_type: datepicker
    el_component: el-date-picker
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "同开始日期，建议备用XPath //span[text()='结束日期']/following::div//input"
    risk_level: low
    risk_reason: ""

  - name: "取样位置1"
    selector: ".el-select:nth-of-type(1) .el-input__inner"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "也可使用 //label[contains(text(),'取样位置1')]/following::div[contains(@class,'el-select')]//input"
    risk_level: medium
    risk_reason: "下拉选项动态加载，选择器依赖顺序"

  - name: "取样位置2"
    selector: ".el-select:nth-of-type(2) .el-input__inner"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "同位置1，使用nth-of-type(2)区分"
    risk_level: medium
    risk_reason: ""

  - name: "查询按钮"
    selector: "button:has(span:text('查询'))"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "如果CSS Selector不支持:has，可使用XPath //button[.//span[text()='查询']]"
    risk_level: low
    risk_reason: ""

  - name: "重置按钮"
    selector: "button:has(span:text('重置'))"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "同查询按钮"
    risk_level: low
    risk_reason: ""

  - name: "对比表格"
    selector: "table.compare-table"
    selector_type: CSS_SELECTOR
    element_type: table
    el_component: el-table
    interaction: wait
    wait_strategy: wait_loading_gone
    locator_notes: "如果无class，可改用 el-table"
    risk_level: medium
    risk_reason: "表格可能动态隐藏/显示，需等待数据加载"

test_scenarios:
  - id: TC-001
    title: "页面加载-空状态"
    priority: P0
    type: smoke
    preconditions: ["登录admin"]
    steps_summary: "导航到气体分析对比页面，查看初始状态"
    expected: "开始日期默认为当前日期-7天，结束日期默认为当天，两个取样位置选择器可见，对比表格为空或不显示"
    relates_to_elements:
      - "开始日期"
      - "结束日期"
      - "取样位置1"
      - "取样位置2"
      - "对比表格"

  - id: TC-002
    title: "双位置对比"
    priority: P0
    type: positive
    preconditions: ["TC-001通过"]
    steps_summary: "选择两个不同的取样位置，点击查询"
    expected: "对比表格加载，显示两个位置的气体分析数据列"
    relates_to_elements:
      - "取样位置1"
      - "取样位置2"
      - "查询按钮"
      - "对比表格"

  - id: TC-003
    title: "相同位置校验"
    priority: P1
    type: negative
    preconditions: []
    steps_summary: "将取样位置1和2设为相同，点击查询"
    expected: "页面无数据或弹出提示'请选择不同位置'"
    relates_to_elements:
      - "取样位置1"
      - "取样位置2"
      - "查询按钮"
      - "对比表格"

page_behaviors:
  - behavior: "初始空状态显示"
    triggers: ["页面加载"]
    wait_required: true
    wait_suggestion: "wait_vue_stable"

  - behavior: "查询后表格加载"
    triggers: ["点击查询按钮"]
    wait_required: true
    wait_suggestion: "wait_loading_gone 或 wait_vue_stable"

  - behavior: "相同位置校验提示"
    triggers: ["查询按钮点击时位置1等于位置2"]
    wait_required: false
    wait_suggestion: "直接检查提示消息或表格空状态"