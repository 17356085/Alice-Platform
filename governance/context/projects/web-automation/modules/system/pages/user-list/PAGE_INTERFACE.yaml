    risk_level: low
    risk_reason: ""

  - name: "重置按钮"
    selector: "button.el-button--default:not(.el-button--primary)"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "纯文字'重置'，一般紧邻查询按钮"
    risk_level: low
    risk_reason: ""

  - name: "新增按钮"
    selector: "button.el-button--primary:first-child"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "工具栏中第一个el-button--primary，文字'新增'"
    risk_level: low
    risk_reason: ""

  - name: "导出按钮"
    selector: "button.el-button--success"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "绿色按钮，文字'导出'"
    risk_level: low
    risk_reason: ""

  - name: "删除按钮（批量）"
    selector: "button.el-button--danger:not(.is-disabled)"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "红色按钮，文字'删除'，无选中行时带is-disabled类"
    risk_level: medium
    risk_reason: "按钮状态动态变化，需确保选中行后可用"

  - name: "数据表格主体"
    selector: ".el-table__body-wrapper tbody"
