    risk_level: low
    risk_reason: ""

test_scenarios:
  - id: TC-001
    title: "用户管理页面正常加载"
    priority: P0
    type: positive
    preconditions:
      - "管理员已登录系统"
    steps_summary: "点击系统管理→用户管理，等待页面加载完毕"
    expected: "页面显示用户列表表格，且表格行数大于0"
    relates_to_elements:
      - "数据表格主体"

  - id: TC-002
    title: "表格列头正确显示"
    priority: P1
    type: positive
    preconditions:
      - "用户列表页已加载"
    steps_summary: "检查表格列头文字是否包含：用户名、姓名、部门、角色、状态、操作"
    expected: "列头依次显示为：用户名、姓名、手机号、角色、组织名称、状态、最后登录、操作"
    relates_to_elements:
      - "数据表格主体"

  - id: TC-003
    title: "分页组件正常显示"
    priority: P1
    type: positive
    preconditions:
      - "用户总数大于10"
    steps_summary: "查看页面底部分页组件，检查总条数、页码、每页条数"
    expected: "显示总条数151，每页10条，页码1-16，且可点击切换"
    relates_to_elements:
      - "分页组件"

page_behaviors:
  - behavior: "表格数据加载与渲染"
    triggers:
      - "页面初次加载"
      - "搜索/筛选条件变化后点击查询"
      - "重置按钮点击"
      - "分页切换"
    wait_required: true
    wait_suggestion: "使用 wait_vue_stable 等待表格 body 出现且 loading 消失"

  - behavior: "下拉选择框（角色/状态）"
    triggers:
      - "点击下拉箭头或选中框"
      - "键盘输入进行过滤"
    wait_required: true
    wait_suggestion: "等待 popper 层插入DOM (可通过 select-dropdown__popper 判断)"

  - behavior: "批量删除操作"
    triggers:
      - "勾选至少一行后点击删除按钮"
      - "弹出确认对话框"
    wait_required: true
    wait_suggestion: "删除后等待 el-message 或数据刷新，使用 wait_loading_gone"

  - behavior: "新增/编辑弹窗"
    triggers:
      - "点击新增按钮"
      - "点击操作列的编辑按钮"
    wait_required: true
    wait_suggestion: "等待 el-dialog 出现并完全渲染，然后填充表单"

  - behavior: "导出操作"
    triggers:
      - "点击导出按钮"
    wait_required: true
    wait_suggestion: "可能触发文件下载，使用 WebDriverWait 等待下载完成或弹窗确认"

  - behavior: "行 hover 高亮"
    triggers:
      - "鼠标悬停在表格行上"
    wait_required: false
    wait_suggestion: "直接使用 ActionChains 进行 hover 即可"