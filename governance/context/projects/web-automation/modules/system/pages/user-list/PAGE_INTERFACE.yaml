    - component: el-button
      count: 5
      risk_flags:
        - id: "BUTTON_DISABLED_STATE"
          description: "删除按钮在无选中行时自动禁用"

elements:
  - name: "搜索输入框"
    selector: ".el-input--suffix input.el-input__inner"
    selector_type: CSS_SELECTOR
    element_type: input
    el_component: el-input
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "placeholder='搜索用户名/姓名/手机号'，宽度240px"
    risk_level: low
    risk_reason: ""

  - name: "角色下拉选择"
    selector: ".el-select:has(.el-select__placeholder:contains('全部角色'))"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_loading_gone
    locator_notes: "默认显示'全部角色'，宽度200px，下拉菜单通过Teleport渲染"
    risk_level: low
    risk_reason: ""

  - name: "状态下拉选择"
    selector: ".el-select:has(.el-select__placeholder:contains('全部'))"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_loading_gone
    locator_notes: "默认显示'全部'，宽度120px，注意不是radio-group"
    risk_level: medium
    risk_reason: "PAGE_CONTEXT提示与PageObject假设存在差异(el-radio-group vs el-select)，可能影响已有测试脚本"

  - name: "查询按钮"
    selector: "button.el-button--primary:has(.el-icon-search)"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
