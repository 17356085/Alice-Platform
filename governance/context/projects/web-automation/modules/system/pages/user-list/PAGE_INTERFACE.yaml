    risk_reason: ""

  - name: "角色标签（表格列）"
    selector: ".el-table__body .cell .el-tag:not(.el-tag--success)"
    selector_type: CSS_SELECTOR
    element_type: tag
    el_component: el-tag
    interaction: hover
    wait_strategy: wait_vue_stable
    locator_notes: "角色列包含多个tag，鼠标悬浮可能显示完整文本"
