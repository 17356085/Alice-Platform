    risk_reason: ""

  - name: "行复选框"
    selector: ".el-table__body-wrapper .el-checkbox"
    selector_type: CSS_SELECTOR
    element_type: checkbox
    el_component: el-checkbox
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "每行第一列的复选框"
    risk_level: low
    risk_reason: ""

  - name: "分页组件"
    selector: ".el-pagination"
