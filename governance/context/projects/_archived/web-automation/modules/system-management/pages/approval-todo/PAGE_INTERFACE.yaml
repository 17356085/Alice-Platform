elements:
  - name: "工厂代码下拉框"
    selector: "//label[contains(text(),'工厂')]/following-sibling::div//input"
    selector_type: XPATH
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "用label文本定位，父级关联el-select中的input"
    risk_level: medium
    risk_reason: "非标准标题字段，JS遍历label定位，可能因DOM结构变化失效"

  - name: "报表日期范围选择器"
    selector: ".el-date-range-picker"
    selector_type: CSS_SELECTOR
    element_type: datepicker
    el_component: el-date-range-picker
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "BasePage通用方法，类名为.el-date-range-picker或.el-date-editor--daterange"
    risk_level: low
    risk_reason: ""

  - name: "搜索按钮"
    selector: "//button[text()='搜索']"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "JS点击绕过拦截，通过文本定位"
    risk_level: high
    risk_reason: "可能被overlay拦截，需使用JS点击方法_js_click_search_or_reset"

  - name: "重置按钮"
    selector: "//button[text()='重置']"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "JS点击绕过拦截，通过文本定位"
    risk_level: high
    risk_reason: "同搜索按钮，可能被overlay拦截"

  - name: "审批操作-通过按钮"
    selector: "//span[contains(text(),'通过')]/ancestor::button"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "表格行内按钮，文本为'通过'"
    risk_level: medium
    risk_reason: "行索引需动态处理，点击后触发弹窗"

  - name: "审批操作-驳回按钮"
    selector: "//span[contains(text(),'驳回')]/ancestor::button"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "表格行内按钮，文本为'驳回'"
    risk_level: medium
    risk_reason: "同通过按钮"

  - name: "审批操作-查看详情按钮"
    selector: "//span[contains(text(),'查看详情')]/ancestor::button"
    selector_type: XPATH
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "表格行内按钮，文本为'查看详情'"
    risk_level: medium
    risk_reason: "行索引需动态处理"

  - name: "审批弹窗"
    selector: ".el-dialog"
    selector_type: CSS_SELECTOR
    element_type: dialog
    el_component: el-dialog
    interaction: wait
    wait_strategy: WebDriverWait
    locator_notes: "审批操作后弹出，含审批意见textarea和确认取消按钮"
    risk_level: low
    risk_reason: ""

  - name: "审批意见输入框"
    selector: ".el-dialog textarea"
    selector_type: CSS_SELECTOR
    element_type: textarea
    el_component: el-input (type="textarea")
    interaction: input
    wait_strategy: WebDriverWait
    locator_notes: "审批弹窗内必填文本域"
    risk_level: medium
    risk_reason: "必填项，输入后需验证"

  - name: "审批弹窗确认按钮"
    selector: ".el-dialog .el-button--primary"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "主按钮，可能被overlay拦截，需JS点击"
    risk_level: high
    risk_reason: "可能被overlay拦截"

  - name: "审批弹窗取消按钮"
    selector: ".el-dialog .el-button:not(.el-button--primary)"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: wait_vue_stable
    locator_notes: "取消关闭弹窗"
    risk_level: low
    risk_reason: ""

  - name: "表格主体"
    selector: ".el-table__body"
    selector_type: CSS_SELECTOR
    element_type: table
    el_component: el-table
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "表格数据区域"
    risk_level: low
    risk_reason: ""

  - name: "表格空状态提示"
    selector: ".el-table__empty-text"
    selector_type: CSS_SELECTOR
    element_type: other
    el_component: el-table
    interaction: wait
    wait_strategy: WebDriverWait
    locator_notes: "空数据时显示，文案可能为'暂无待审批项'或'暂无数据'"
    risk_level: high
    risk_reason: "空状态文案变体，断言需用'暂无'前缀匹配"

