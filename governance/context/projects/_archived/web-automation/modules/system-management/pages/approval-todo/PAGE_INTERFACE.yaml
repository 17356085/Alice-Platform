interface: page-to-automation
version: "1.0"
source_agent: test-design-agent
target_agent: automation-agent
generated_at: "2026-06-13 12:26"

meta:
  module: "system-management"
  page_name: "ApprovalTodo"
  page_slug: "approval-todo"
  page_url: "#/system/workflow/todo"
  vue_components:
    - component: el-table
      count: 1
      risk_flags: []
    - component: el-select
      count: 1
      risk_flags: ["搜索字段非标题，需通过label关联"]
    - component: el-date-range-picker
      count: 1
      risk_flags: []
    - component: el-button
      count: 4
      risk_flags: ["搜索/重置可能被拦截，使用JS点击"]
    - component: el-dialog
