    triggers: ["页面加载", "筛选搜索后", "审批操作后"]
    wait_required: true
    wait_suggestion: "wait_vue_stable 或等待表格加载完成"

  - behavior: "审批弹窗弹出"
    triggers: ["点击通过/驳回按钮"]
    wait_required: true
    wait_suggestion: "WebDriverWait 等待 .el-dialog 可见"

  - behavior: "搜索区表单重置"
    triggers: ["点击重置按钮"]
    wait_required: true
    wait_suggestion: "等待表单控件恢复默认值，然后 wait_vue_stable"

  - behavior: "审批操作后列表刷新"
    triggers: ["审批通过/驳回确认后"]
    wait_required: true
    wait_suggestion: "等待 loading 消失或表格重新渲染，使用 wait_loading_gone"

  - behavior: "搜索字段非标题（与CRUD不同）"
    triggers: ["页面初始化"]
    wait_required: false
    wait_suggestion: "注意定位策略，避免与通用CRUD页面混淆"