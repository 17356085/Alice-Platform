test_scenarios:
  - id: TC-CUST-001
    title: "页面正常加载"
    priority: P0
    type: positive
    preconditions: ["admin登录"]
    steps_summary: "导航到 /sales/customer，等待表格加载"
    expected: "搜索区、表格(7列)、分页、新增按钮均可见"
