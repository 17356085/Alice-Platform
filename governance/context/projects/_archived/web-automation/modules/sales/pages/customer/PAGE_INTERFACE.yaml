    priority: P0
    type: negative
    preconditions: ["销售员角色登录"]
    steps_summary: "直接访问 /sales/customer，检查操作按钮"
    expected: "页面加载但编辑/删除按钮不可见"
    relates_to_elements: ["表格行操作编辑按钮", "表格行操作删除按钮", "新增客户按钮"]
  - id: TC-CUST-005
    title: "客户名称精确搜索"
    priority: P1
    type: positive
    preconditions: ["存在客户'测试客户_A'"]
    steps_summary: "输入'测试客户_A'，点击搜索"
    expected: "返回≥1条且名称匹配"
    relates_to_elements: ["客户名称搜索输入框", "搜索按钮"]
  - id: TC-CUST-006
    title: "客户编码模糊搜索"
    priority: P1
    type: positive
    preconditions: ["存在编码含'C06'的记录"]
    steps_summary: "输入'C06'，点击搜索"
    expected: "返回结果编码均含'C06'"
    relates_to_elements: ["客户编码搜索输入框", "搜索按钮"]
  - id: TC-CUST-007
    title: "客户等级筛选"
    priority: P1
    type: positive
    preconditions: ["多等级数据"]
    steps_summary: "选择等级'A级'，点击搜索"
    expected: "返回结果均为A级客户"
    relates_to_elements: ["客户等级下拉选择", "搜索按钮"]
  - id: TC-CUST-008
    title: "合作状态筛选"
    priority: P1
    type: positive
    preconditions: ["多状态数据"]
    steps_summary: "选择状态'合作中'，点击搜索"
    expected: "返回结果均为合作中"
    relates_to_elements: ["合作状态下拉选择", "搜索按钮"]
  - id: TC-CUST-009
    title: "组合搜索"
    priority: P1
    type: positive
    preconditions: ["存在匹配数据"]
    steps_summary: "名称+等级+状态同时筛选后搜索"
    expected: "同时满足三条件"
    relates_to_elements: ["客户名称搜索输入框", "客户等级下拉选择", "合作状态下拉选择", "搜索按钮"]
  - id: TC-CUST-010
    title: "重置搜索"
    priority: P1
    type: positive
    preconditions: ["已有筛选条件"]
    steps_summary: "输入关键词+等级搜索，再点击重置"
    expected: "恢复默认全量数据"
    relates_to_elements: ["重置按钮", "客户名称搜索输入框", "客户等级下拉选择"]
  - id: TC-CUST-011
