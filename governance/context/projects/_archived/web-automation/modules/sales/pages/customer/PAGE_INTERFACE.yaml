    steps_summary: "获取表头，对比预期列集合"
    expected: "7列全部匹配：客户编码/客户名称/联系人/联系电话/客户等级/合作状态/操作"
    relates_to_elements: ["表格列头"]
  - id: TC-CUST-003
    title: "删除-确认弹窗出现"
    priority: P0
    type: positive
    preconditions: ["表格有数据"]
    steps_summary: "点击第一行删除按钮，检查弹窗"
    expected: "弹窗可见，含客户名称及确定/取消按钮"
    relates_to_elements: ["表格行操作删除按钮", "删除确认弹窗", "弹窗确定按钮", "弹窗取消按钮"]
  - id: TC-CUST-004
