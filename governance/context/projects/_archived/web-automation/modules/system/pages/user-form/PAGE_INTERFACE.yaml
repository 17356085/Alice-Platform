    priority: P1
    type: negative
    preconditions: ["新增弹窗已打开"]
    steps_summary: "将必填项留空，点击确定"
    expected: "6个必填项显示红色错误提示"
    relates_to_elements: ["确定按钮（新增/编辑/分配角色）"]

  - id: TC-UF-003
    title: "密码不一致校验"
    priority: P1
    type: negative
    preconditions: ["新增弹窗已打开"]
    steps_summary: "输入密码'123'，确认密码'456'，点击确定"
    expected: "提示'两次密码不一致'"
    relates_to_elements: ["密码输入框", "确认密码输入框", "确定按钮（新增/编辑/分配角色）"]

  - id: TC-UF-004
    title: "提交成功"
    priority: P1
    type: positive
    preconditions: ["新增弹窗已打开"]
    steps_summary: "填写所有必填项（用户名、姓名、密码、确认密码、部门、用户类型），点击确定"
    expected: "Toast提示'新增成功'，弹窗关闭，列表刷新"
    relates_to_elements: ["用户名输入框", "姓名输入框", "密码输入框", "确认密码输入框", "部门选择器", "用户类型选择器", "确定按钮（新增/编辑/分配角色）"]

  - id: TC-UF-005
    title: "取消新增"
    priority: P1
    type: positive
    preconditions: ["新增弹窗已打开并填写部分数据"]
    steps_summary: "点击取消按钮"
    expected: "弹窗关闭，数据未创建"
    relates_to_elements: ["取消按钮"]

  - id: TC-UF-006
    title: "用户名重复"
    priority: P1
    type: negative
    preconditions: ["存在用户'szj'", "新增弹窗已打开"]
    steps_summary: "输入用户名'szj'，填写其他必填项，点击确定"
    expected: "Toast提示'数据已存在'"
    relates_to_elements: ["用户名输入框", "确定按钮（新增/编辑/分配角色）"]

  - id: TC-UF-007
    title: "编辑弹窗数据回显"
