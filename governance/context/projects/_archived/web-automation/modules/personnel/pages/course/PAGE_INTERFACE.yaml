    el_component: el-input
    interaction: input
    wait_strategy: wait_vue_stable
    locator_notes: "若placeholder无明确定义，可改用 .search-form .el-input--prefix input"
    risk_level: low
    risk_reason: ""

  - name: "课程分类下拉选择器"
