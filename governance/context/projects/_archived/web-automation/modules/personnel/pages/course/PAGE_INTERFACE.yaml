    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "可能需要先点击展开下拉，再选择选项；选项可定位为 .el-select-dropdown__item"
    risk_level: medium
    risk_reason: "异步加载选项，需等待选项渲染完毕"

