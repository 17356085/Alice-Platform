test_scenarios:
  - id: TC-CRS-001
    title: "页面正常加载"
    priority: P0
    type: smoke
    preconditions: ["用户具有查看权限"]
    steps_summary: "导航至课程管理页面"
    expected: "课程卡片网格（或表格）正确渲染，无异常错误"
    relates_to_elements:
      - "课程表格"
  - id: TC-CRS-002
    title: "删除被引用课程"
    priority: P0
    type: destructive
    preconditions: ["存在被培训计划引用的课程"]
    steps_summary: "点击该课程的删除按钮，确认删除"
    expected: "后端返回删除失败提示，Toast显示错误信息，表格未刷新"
    relates_to_elements:
      - "删除按钮（行内）"
      - "弹窗-确定/提交按钮"
  - id: TC-CRS-003
    title: "名称搜索"
    priority: P1
    type: positive
    preconditions: ["课程列表存在多条记录"]
    steps_summary: "在课程名称输入框输入已知课程名称，点击搜索"
    expected: "表格仅显示匹配该名称的课程"
    relates_to_elements:
      - "课程名称搜索输入框"
      - "搜索按钮"
  - id: TC-CRS-004
    title: "分类筛选"
    priority: P1
    type: positive
    preconditions: ["存在多个分类"]
    steps_summary: "选择课程分类下拉中的某个选项，点击搜索"
    expected: "表格仅显示该分类下的课程"
    relates_to_elements:
      - "课程分类下拉选择器"
      - "搜索按钮"
  - id: TC-CRS-005
    title: "素材类型筛选"
    priority: P1
    type: positive
    preconditions: ["存在不同类型的课程（如视频、文档）"]
    steps_summary: "选择素材类型下拉（如果存在），点击搜索"
    expected: "表格过滤正确"
    relates_to_elements:
      - "搜索按钮"
  - id: TC-CRS-006
    title: "发布状态筛选"
    priority: P1
    type: positive
    preconditions: ["存在不同状态的课程"]
    steps_summary: "选择发布状态下拉（如已发布/未发布），点击搜索"
    expected: "表格过滤正确"
    relates_to_elements:
      - "搜索按钮"
  - id: TC-CRS-007
    title: "重置"
    priority: P1
    type: positive
    preconditions: ["已进行搜索或筛选"]
    steps_summary: "点击重置按钮"
    expected: "搜索条件清空，表格恢复显示全部课程数据"
    relates_to_elements:
      - "重置按钮"
      - "课程名称搜索输入框"
      - "课程分类下拉选择器"
  - id: TC-CRS-008
    title: "新增课程"
    priority: P1
    type: positive
    preconditions: ["用户具有新增权限"]
    steps_summary: "点击新增按钮→填写必填项（名称、分类）→上传封面→点击确定"
    expected: "弹窗关闭，出现成功Toast，表格刷新显示新课程"
    relates_to_elements:
      - "新增课程按钮"
      - "弹窗-课程名称输入框"
      - "弹窗-课程分类选择器"
      - "弹窗-封面图上传组件"
      - "弹窗-确定/提交按钮"
  - id: TC-CRS-009
    title: "查看详情"
    priority: P1
    type: positive
    preconditions: ["存在已创建的课程"]
    steps_summary: "点击课程名称或详情按钮"
    expected: "弹出课程详情弹窗显示完整信息"
    relates_to_elements:
      - "课程表格"

page_behaviors:
  - behavior: "表格异步加载数据"
    triggers:
      - "页面加载"
      - "搜索后"
      - "重置后"
      - "分页切换"
      - "新增/编辑/删除后"
    wait_required: true
    wait_suggestion: "wait_loading_gone (等待.el-loading-mask消失) 或 wait_vue_stable"
  - behavior: "分类下拉异步加载选项"
    triggers:
      - "进入弹窗（新增/编辑）"
      - "点击分类选择器"
    wait_required: true
    wait_suggestion: "等待.el-select-dropdown渲染，或使用wait_vue_stable"
  - behavior: "文件上传后触发刷新"
    triggers:
      - "上传封面图片完成"
    wait_required: true
    wait_suggestion: "监听上传成功事件(如响应中出现success标志)，再继续后续操作"
  - behavior: "弹窗操作后表格刷新"
    triggers:
      - "新增/编辑提交成功"
      - "删除确认后"
    wait_required: true
    wait_suggestion: "等待弹窗关闭动画 + 表格loading消失"