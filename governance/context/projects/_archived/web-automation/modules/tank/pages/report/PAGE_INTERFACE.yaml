page_behaviors:
  - behavior: "页面初始渲染"
    triggers: ["页面加载"]
    wait_required: true
    wait_suggestion: "wait_vue_stable"

  - behavior: "数据联动刷新（下拉框+日期→统计卡片+趋势图）"
    triggers: ["选择储罐", "选择日期"]
    wait_required: true
    wait_suggestion: "wait_loading_gone 或 wait_vue_stable"

  - behavior: "趋势图Tab切换"
    triggers: ["点击近7天/近15天/近30天Tab"]
    wait_required: true
    wait_suggestion: "先 wait_loading_gone，再等待图表渲染（可配合 JS 执行检查 canvas 元素）"

  - behavior: "导出文件下载"
    triggers: ["点击导出按钮"]
    wait_required: true
    wait_suggestion: "WebDriverWait 等待下载完成或监听浏览器下载事件"

  - behavior: "空数据展示"
    triggers: ["选择无数据日期"]
    wait_required: true
    wait_suggestion: "wait_vue_stable"

  - behavior: "权限不足提示"
    triggers: ["操作工账号访问页面"]
    wait_required: true
    wait_suggestion: "wait_vue_stable 或等待弹窗出现"