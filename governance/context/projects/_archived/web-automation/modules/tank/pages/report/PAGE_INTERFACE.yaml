interface: page-to-automation
version: "1.0"
source_agent: test-design-agent
target_agent: automation-agent
generated_at: "2026-06-13 12:08"

meta:
  module: "tank"
  page_name: "TankReport"
  page_slug: "report"
  page_url: "/tank/report"
  vue_components:
    - component: el-select
      count: 1
      risk_flags: []
    - component: el-date-picker
      count: 1
      risk_flags: []
    - component: el-button
      count: 1
      risk_flags: []
    - component: el-statistic
      count: 3
      risk_flags: []
    - component: el-tabs
      count: 1
      risk_flags: ["动态图表重绘可能延迟"]

elements:
  - name: "选择储罐下拉框"
    selector: "#select-tank"
    selector_type: CSS_SELECTOR
    element_type: select
    el_component: el-select
    interaction: select
    wait_strategy: wait_vue_stable
    locator_notes: "默认显示'全部储罐'，选项值需通过接口获取"
    risk_level: low
    risk_reason: "下拉框选项可穷举，无复杂联动"

  - name: "选择日期"
    selector: "#date-picker"
    selector_type: CSS_SELECTOR
    element_type: datepicker
    el_component: el-date-picker
    interaction: input
    wait_strategy: wait_loading_gone
    locator_notes: "单日选择，需确保日期格式与接口一致"
    risk_level: medium
    risk_reason: "日期选择器弹出面板可能遮挡，需处理时间等待"

  - name: "导出按钮"
    selector: "#btn-export"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-button
    interaction: click
    wait_strategy: WebDriverWait
    locator_notes: "点击后触发文件下载，需监听下载事件"
    risk_level: low
    risk_reason: "下载行为依赖浏览器设置，需特殊处理文件校验"

  - name: "今日进气量统计卡片"
    selector: "#stat-intake"
    selector_type: CSS_SELECTOR
    element_type: text
    el_component: el-statistic
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "显示数值+单位 t，如 '0 t'"
    risk_level: low
    risk_reason: "纯展示文本，稳定"

  - name: "今日出气量统计卡片"
    selector: "#stat-outgas"
    selector_type: CSS_SELECTOR
    element_type: text
    el_component: el-statistic
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "显示数值+单位 t"
    risk_level: low

  - name: "当前库存量统计卡片"
    selector: "#stat-inventory"
    selector_type: CSS_SELECTOR
    element_type: text
    el_component: el-statistic
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "显示数值+单位 t，如 '3,775 t'"
    risk_level: low

  - name: "近7天趋势图"
    selector: "#trend-chart"
    selector_type: CSS_SELECTOR
    element_type: other
    el_component: other
    interaction: wait
    wait_strategy: wait_vue_stable
    locator_notes: "ECharts / G2 渲染的 canvas，无法直接获取内部数据，需截图或 JS 执行"
    risk_level: medium
    risk_reason: "图表渲染依赖数据且为 canvas，验证困难"

  - name: "近7天Tab"
    selector: "#tab-7d"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-tabs
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "默认选中，切换后图表重新加载"
    risk_level: low
    risk_reason: "Tab 切换行为稳定"

  - name: "近15天Tab"
    selector: "#tab-15d"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-tabs
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: "切换后触发图表刷新"
    risk_level: low

  - name: "近30天Tab"
    selector: "#tab-30d"
    selector_type: CSS_SELECTOR
    element_type: button
    el_component: el-tabs
    interaction: click
    wait_strategy: wait_loading_gone
    locator_notes: ""
    risk_level: low

