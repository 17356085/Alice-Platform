name: Agent Quality Gate

# P3 (Phase 8): CI/CD 质量门禁
# 每步失败阻止 merge，确保 Agent 平台变更不引入退化

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'governance/skills/**'
      - 'governance/skills-dev/**'
      - 'governance/agents/**'
      - 'aitest/**'
      - 'ZJSN_Test-master526/page/**'
      - 'ZJSN_Test-master526/script/**'
  push:
    branches: [main, master]
    paths:
      - 'governance/skills/**'
      - 'aitest/governance/**'

jobs:
  # ── Stage 0: Code Redline Check ───────────────────────────
  code-redline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run code redline checks
        run: |
          pip install pyyaml
          python ZJSN_Test-master526/tools/check_code_quality.py --staged --json

  # ── Stage 1: Consistency Check ────────────────────────────
  consistency:
    runs-on: ubuntu-latest
    needs: code-redline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run consistency checks
        run: |
          pip install pyyaml
          python -c "
          from aitest.testing.consistency_checker import run_all_checks
          results = run_all_checks()
          failed = [r for r in results if not r.get('ok', True)]
          if failed:
              print(f'FAILED: {len(failed)} consistency checks')
              for f in failed:
                  print(f'  - {f.get(\"check\", \"unknown\")}: {f.get(\"detail\", \"\")}')
              exit(1)
          print(f'OK: all {len(results)} checks passed')
          "

  # ── Stage 2: Regression Tests ─────────────────────────────
  regression:
    runs-on: ubuntu-latest
    needs: consistency
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run regression tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install pyyaml
          python -c "
          from aitest.testing.regression import RegressionRunner
          runner = RegressionRunner(provider='claude')
          results = runner.run_all(tags=['smoke'])
          failed = [r for r in results if not r.passed]
          if failed:
              print(f'REGRESSION: {len(failed)}/{len(results)} failed')
              for f in failed:
                  print(f'  - {f.case_id}: score={f.score:.2f}')
              exit(1)
          print(f'OK: all {len(results)} regression tests passed')
          "

  # ── Stage 3: SOP Gate Check ───────────────────────────────
  sop-gate:
    runs-on: ubuntu-latest
    needs: regression
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run SOP gate checks
        run: |
          pip install pyyaml
          python ZJSN_Test-master526/tools/check_sop_gate.py --all --json

  # ── Stage 4: Safety Audit (P0) ────────────────────────────
  safety-audit:
    runs-on: ubuntu-latest
    needs: sop-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run safety audit
        run: |
          pip install pyyaml
          python -c "
          from aitest.governance.safety_auditor import SafetyAuditor
          import json, os
          # 审计最近变更的模块
          modules = os.environ.get('CHANGED_MODULES', 'system,equipment').split(',')
          all_pass = True
          for m in modules:
              if not m.strip(): continue
              report = SafetyAuditor().audit(m.strip(), days=7)
              if report['overall_status'] in ('critical', 'error'):
                  print(f'SAFETY FAIL: {m} - status={report[\"overall_status\"]}, violations={report[\"total_violations\"]}')
                  all_pass = False
          if not all_pass:
              exit(1)
          print('SAFETY OK: all modules passed safety audit')
          "

  # ── Stage 5: Step Efficiency (P2) ─────────────────────────
  step-efficiency:
    runs-on: ubuntu-latest
    needs: safety-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run step efficiency analysis
        run: |
          pip install pyyaml
          python -c "
          from aitest.governance.step_efficiency import StepEfficiencyAnalyzer
          analyzer = StepEfficiencyAnalyzer()
          report = analyzer.analyze('system', days=30)
          score = report.get('efficiency_score', 100)
          if score < 50:
              print(f'EFFICIENCY WARN: score={score}/100')
              # 不阻塞，仅警告
          print(f'Efficiency score: {score}/100')
          "
