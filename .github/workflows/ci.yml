# AITest Platform v1.0 — CI Pipeline
#
# Runs on every push and PR to master/main.
# Lint → Test → Build Docker image.

name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic sqlalchemy chromadb \
            langgraph anthropic openai pyyaml python-dotenv httpx
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest aitest/tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aitest-platform:${{ github.sha }} .

      - name: Verify health endpoint
        run: |
          docker run -d --name aitest-ci -p 8000:8000 \
            -e ANTHROPIC_API_KEY=ci-test \
            aitest-platform:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || echo "Health check failed (expected without valid API key)"
          docker stop aitest-ci
